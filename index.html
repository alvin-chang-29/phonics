<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Phonics Master AI</title>
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { transition: all 0.2s ease; }
        .active-unit { background-color: #fef3c7; border-color: #f59e0b; color: #b45309; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #f59e0b; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .voice-btn-active { background-color: #f59e0b; color: white; }
    </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden flex flex-col">

    <header class="bg-white pt-12 pb-4 px-6 shadow-sm border-b">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-[10px] font-black text-amber-500 uppercase tracking-tighter">Azure AI Pro Neural Voice</p>
                <h1 class="text-xl font-bold text-slate-800">Phonics Master</h1>
            </div>
            <div class="flex flex-col items-end gap-2">
                <div id="unit-display" class="bg-amber-500 text-white px-2 py-1 rounded text-xs font-bold">Short A</div>
                <div class="flex bg-gray-100 rounded-lg p-1 text-[10px] font-bold">
                    <button onclick="changeVoice('en-US-JennyNeural')" id="btn-jenny" class="px-2 py-1 rounded voice-btn-active">Jenny</button>
                    <button onclick="changeVoice('en-US-GuyNeural')" id="btn-guy" class="px-2 py-1 rounded ml-1">Guy</button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 space-y-3" id="app-content"></main>

    <div class="bg-white border-t p-4 flex space-x-3 overflow-x-auto" id="nav-bar"></div>

    <script>
        const subscriptionKey = "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k";
        const serviceRegion = "eastasia";
        let currentVoice = "en-US-JennyNeural";

        const wordData = {
            shortA: { label: 'Short A', icon: '🍎', data: [
                { word: 'Ant', sound: 'ant' }, { word: 'Cat', sound: 'at' }, { word: 'Bag', sound: 'ag' }, { word: 'Cap', sound: 'ap' },
                { word: 'Sad', sound: 'ad' }, { word: 'Van', sound: 'an' }, { word: 'Bat', sound: 'at' }, { word: 'Rat', sound: 'at' },
                { word: 'Pan', sound: 'an' }, { word: 'Can', sound: 'an' }
            ]},
            shortE: { label: 'Short E', icon: '🥚', data: [
                { word: 'Bed', sound: 'ed' }, { word: 'Jet', sound: 'et' }, { word: 'Pen', sound: 'en' }, { word: 'Red', sound: 'ed' },
                { word: 'Net', sound: 'et' }, { word: 'Hen', sound: 'en' }, { word: 'Egg', sound: 'egg' }
            ]},
            shortI: { label: 'Short I', icon: '🐷', data: [
                { word: 'Pin', sound: 'in' }, { word: 'Lid', sound: 'id' }, { word: 'Sit', sound: 'it' }, { word: 'Pig', sound: 'ig' },
                { word: 'Wig', sound: 'ig' }, { word: 'Bin', sound: 'in' }, { word: 'Six', sound: 'ix' }
            ]},
            shortO: { label: 'Short O', icon: '🐙', data: [
                { word: 'Pot', sound: 'ot' }, { word: 'Hot', sound: 'ot' }, { word: 'Dot', sound: 'ot' }, { word: 'Dog', sound: 'og' },
                { word: 'Box', sound: 'ox' }, { word: 'Fox', sound: 'ox' }, { word: 'Top', sound: 'op' }
            ]},
            shortU: { label: 'Short U', icon: '☂️', data: [
                { word: 'Bus', sound: 'us' }, { word: 'Sun', sound: 'un' }, { word: 'Cup', sound: 'up' }, { word: 'Bug', sound: 'ug' },
                { word: 'Nut', sound: 'ut' }, { word: 'Rug', sound: 'ug' }, { word: 'Tub', sound: 'ub' }
            ]}
        };

        let currentKey = 'shortA';

        // 使用 Azure 神經網路語音播放
        function playSound(text) {
            const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(subscriptionKey, serviceRegion);
            speechConfig.speechSynthesisVoiceName = currentVoice;
            const synthesizer = new SpeechSDK.SpeechSynthesizer(speechConfig);
            synthesizer.speakTextAsync(text, result => { synthesizer.close(); }, err => { console.error(err); });
        }

        function changeVoice(voiceName) {
            currentVoice = voiceName;
            document.getElementById('btn-jenny').classList.toggle('voice-btn-active', voiceName.includes('Jenny'));
            document.getElementById('btn-guy').classList.toggle('voice-btn-active', voiceName.includes('Guy'));
        }

        async function startAzureEval(targetWord, index) {
            const statusIcon = document.getElementById(`status-${index}`);
            const feedbackText = document.getElementById(`feedback-${index}`);
            statusIcon.innerHTML = '<div class="spinner"></div>';
            feedbackText.innerText = 'Listening...';

            const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(subscriptionKey, serviceRegion);
            const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
            const pronConfig = new SpeechSDK.PronunciationAssessmentConfig(targetWord, SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark, SpeechSDK.PronunciationAssessmentGranularity.Phoneme);
            const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
            pronConfig.applyTo(recognizer);

            recognizer.recognizeOnceAsync(result => {
                const score = SpeechSDK.PronunciationAssessmentResult.fromResult(result).accuracyScore;
                if (score >= 80) {
                    statusIcon.innerHTML = '✅';
                    feedbackText.innerText = "Excellent!";
                    feedbackText.className = "text-[10px] text-green-600 font-bold mt-2";
                } else {
                    statusIcon.innerHTML = '🎤';
                    feedbackText.innerText = "Try again!";
                    feedbackText.className = "text-[10px] text-orange-500 font-bold mt-2";
                }
                recognizer.close();
            });
        }

        function renderApp() {
            const container = document.getElementById('app-content');
            container.innerHTML = wordData[currentKey].data.map((item, i) => `
                <div class="bg-white rounded-2xl p-4 shadow-sm border-l-4 border-amber-400 flex justify-between items-center card">
                    <div class="flex-1" onclick="playSound('${item.word}')">
                        <h2 class="text-3xl font-black text-slate-800">${item.word}</h2>
                        <p class="text-gray-400 text-xs italic">-${item.sound} family</p>
                    </div>
                    <div class="flex flex-col items-center pl-4 border-l min-w-[90px]">
                        <button id="status-${i}" onclick="startAzureEval('${item.word}', ${i})" class="bg-slate-50 w-10 h-10 rounded-full flex items-center justify-center text-lg shadow-inner">🎤</button>
                        <div id="feedback-${i}" class="text-[10px] text-gray-300 font-bold mt-2 text-center">Tap to practice</div>
                    </div>
                </div>`).join('');

            document.getElementById('nav-bar').innerHTML = Object.keys(wordData).map(key => `
                <button onclick="switchUnit('${key}')" class="flex-shrink-0 flex flex-col items-center px-4 py-2 rounded-xl border ${currentKey === key ? 'active-unit shadow-md' : 'border-transparent text-gray-400'}">
                    <span class="text-xl">${wordData[key].icon}</span><span class="text-[10px] font-bold">${wordData[key].label}</span>
                </button>`).join('');
            document.getElementById('unit-display').innerText = wordData[currentKey].label;
        }

        function switchUnit(key) { currentKey = key; renderApp(); }
        renderApp();
    </script>
</body>
</html>

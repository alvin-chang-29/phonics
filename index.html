<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Phonics Master Mobile - Stable</title>
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fdf6e3; }
        .tab-active { color: #EE1515; border-bottom: 4px solid #EE1515; }
        .poke-card { border: 6px solid #FFDE00; border-radius: 20px; background: white; }
        .mic-btn { 
            width: 60px; height: 60px; 
            background-image: url('https://img.icons8.com/color/96/pokeball.png'); 
            background-size: contain; background-repeat: no-repeat;
            cursor: pointer;
        }
        .recording .mic-btn { animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="setup-overlay" class="fixed inset-0 bg-red-600 z-50 flex flex-col items-center justify-center text-white p-6">
        <h1 class="text-3xl font-black mb-8 text-yellow-400">POKÉ PHONICS</h1>
        <div class="mb-6 w-full max-w-xs">
            <label class="block text-sm font-bold mb-2">選擇老師人聲：</label>
            <select id="voice-select" class="w-full p-3 rounded-xl text-black font-bold">
                <option value="en-US-AvaNeural">Ava (美語女聲 - 推薦)</option>
                <option value="en-US-AndrewNeural">Andrew (美語男聲)</option>
                <option value="en-GB-SoniaNeural">Sonia (英式女聲)</option>
            </select>
        </div>
        <button onclick="initApp()" class="bg-white text-red-600 px-12 py-4 rounded-full font-black text-xl shadow-xl">開始測試</button>
    </div>

    <header class="bg-white pt-12 px-6 shadow-md">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold">練習模式</h1>
            <button onclick="showAddModal()" class="bg-red-500 text-white px-4 py-1 rounded-full font-bold text-xs">＋ 新增</button>
        </div>
        <div class="flex space-x-8 text-sm">
            <button onclick="switchTab('words')" id="tab-words" class="pb-2 font-bold tab-active">單字 (小寫)</button>
            <button onclick="switchTab('sentences')" id="tab-sentences" class="pb-2 font-bold text-gray-400">句子練習</button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 no-scrollbar" id="app-content"></main>

    <nav id="unit-nav" class="bg-white border-t p-4 flex gap-3 overflow-x-auto no-scrollbar"></nav>

    <div id="add-modal" class="fixed inset-0 bg-black/60 z-40 hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-6 w-full">
            <h3 class="font-bold mb-4">新增內容</h3>
            <textarea id="input-content" class="w-full border p-3 rounded-xl mb-4 h-24" placeholder="請輸入英文..."></textarea>
            <div class="flex gap-3">
                <button onclick="hideAddModal()" class="flex-1 py-3 text-gray-400">取消</button>
                <button onclick="processAdd()" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold">確認</button>
            </div>
        </div>
    </div>

    <script>
        const azureKey = "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k";
        const azureRegion = "eastasia";
        let isRecording = false;
        let currentTab = 'words';
        let currentUnit = 'shortA';
        let selectedVoice = "en-US-AvaNeural";

        let wordData = JSON.parse(localStorage.getItem('local_words_v2')) || {
            shortA: { label: 'Short A', icon: '🍎', data: [{word:'cat'}, {word:'bag'}] },
            longA: { label: 'Long A', icon: '🍰', data: [{word:'cake'}, {word:'lake'}] }
        };
        let sentenceData = JSON.parse(localStorage.getItem('local_sentences_v2')) || ["the cat sat on the mat."];

        function initApp() {
            selectedVoice = document.getElementById('voice-select').value;
            navigator.mediaDevices.getUserMedia({ audio: true }).then(() => {
                document.getElementById('setup-overlay').style.display = 'none';
                renderApp();
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-words').className = tab === 'words' ? 'pb-2 font-bold tab-active' : 'pb-2 font-bold text-gray-400';
            document.getElementById('tab-sentences').className = tab === 'sentences' ? 'pb-2 font-bold tab-active' : 'pb-2 font-bold text-gray-400';
            document.getElementById('unit-nav').style.display = tab === 'words' ? 'flex' : 'none';
            renderApp();
        }

        function processAdd() {
            const input = document.getElementById('input-content').value.trim().toLowerCase();
            if (!input) return;

            if (currentTab === 'words') {
                const cat = input.endsWith('e') ? 'longA' : 'shortA';
                if(!wordData[cat]) wordData[cat] = { label: cat, icon: '🆕', data: [] };
                wordData[cat].data.push({ word: input });
                localStorage.setItem('local_words_v2', JSON.stringify(wordData));
            } else {
                sentenceData.push(input);
                localStorage.setItem('local_sentences_v2', JSON.stringify(sentenceData));
            }
            hideAddModal();
            renderApp();
        }

        function speak(text) {
            if(isRecording) return;
            const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(azureKey, azureRegion);
            speechConfig.speechSynthesisVoiceName = selectedVoice;
            const synthesizer = new SpeechSDK.SpeechSynthesizer(speechConfig);
            synthesizer.speakTextAsync(text, r => synthesizer.close(), e => console.error(e));
        }

        async function startEval(text, index) {
            if(isRecording) return;
            isRecording = true;
            
            const card = document.getElementById(`card-${index}`);
            const fb = document.getElementById(`fb-${index}`);
            card.classList.add('recording');
            fb.innerText = "正在聽... (5s)";

            const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(azureKey, azureRegion);
            const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
            const pronConfig = new SpeechSDK.PronunciationAssessmentConfig(text, 100, 0);
            const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
            pronConfig.applyTo(recognizer);

            recognizer.recognizeOnceAsync(result => {
                const score = SpeechSDK.PronunciationAssessmentResult.fromResult(result).accuracyScore;
                card.classList.remove('recording');
                fb.innerText = score >= 80 ? "太棒了！🌟" : "再試一次！";
                fb.className = score >= 80 ? "text-xs font-bold mt-2 text-green-600" : "text-xs font-bold mt-2 text-red-500";
                isRecording = false;
                recognizer.close();
            });
        }

        function renderApp() {
            const container = document.getElementById('app-content');
            const nav = document.getElementById('unit-nav');

            if (currentTab === 'words') {
                container.innerHTML = (wordData[currentUnit]?.data || []).map((item, i) => `
                    <div class="poke-card p-6 mb-4 flex justify-between items-center shadow-sm" id="card-${i}">
                        <div onclick="speak('${item.word}')" class="flex-1">
                            <h2 class="text-4xl font-black text-blue-900">${item.word.toLowerCase()}</h2>
                            <p class="text-[10px] text-gray-400">點擊單字聽發音</p>
                        </div>
                        <div class="flex flex-col items-center ml-4" onclick="startEval('${item.word}', ${i})">
                            <div class="mic-btn"></div>
                            <p id="fb-${i}" class="text-[10px] font-bold mt-2 text-gray-300">按球錄音</p>
                        </div>
                    </div>`).join('');
                
                nav.innerHTML = Object.keys(wordData).map(key => `
                    <button onclick="switchUnit('${key}')" class="flex-shrink-0 flex flex-col items-center px-6 py-2 rounded-2xl border ${currentUnit === key ? 'bg-yellow-100 border-yellow-400' : 'bg-white border-transparent text-gray-400 shadow-sm'}">
                        <span class="text-xl">${wordData[key].icon}</span>
                        <span class="text-[10px] font-bold">${wordData[key].label}</span>
                    </button>`).join('');
            } else {
                container.innerHTML = sentenceData.map((s, i) => `
                    <div class="bg-white rounded-3xl p-6 mb-4 border-l-8 border-blue-500 shadow-md" id="card-${i}">
                        <p class="text-xl font-bold text-slate-800 mb-6" onclick="speak('${s}')">${s.toLowerCase()}</p>
                        <div class="flex justify-between items-center border-t pt-4">
                            <p id="fb-${i}" class="text-xs font-bold text-gray-400">點擊句子播放 / 按球挑戰</p>
                            <div onclick="startEval('${s}', ${i})" class="mic-btn scale-90"></div>
                        </div>
                    </div>`).join('');
            }
        }

        function switchUnit(key) { currentUnit = key; renderApp(); }
        function showAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
        function hideAddModal() { document.getElementById('add-modal').classList.add('hidden'); document.getElementById('input-content').value = ''; }
        
        renderApp();
    </script>
</body>
</html>

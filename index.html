<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Phonics Hero v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-cognitiveservices-speech-sdk/1.37.0/microsoft.cognitiveservices.speech.sdk.bundle.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; background-color: #FDF4D0; margin: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .ipad-sidebar { background-color: #2D2D2D; width: 300px; flex-shrink: 0; }
        .active-lesson { background-color: #CC0000 !important; color: white !important; }
        .card-pokemon { background: white; border-radius: 40px; box-shadow: 0 10px 0 #E5E5E5; border: 2px solid #F3F4F6; }
        #boot-screen { position: fixed; inset: 0; background: #111; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .feedback-pop { animation: popScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popScale { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="h-screen flex">

    <div id="boot-screen">
        <h1 class="text-6xl font-black text-yellow-400 italic mb-4">PHONICS HERO</h1>
        <p class="text-gray-500 font-bold mb-10 text-xl tracking-widest uppercase">Version 6.0 - Pro Trainer</p>
        <button id="start-btn" onclick="ipadMasterLaunch()" class="bg-blue-600 text-white px-20 py-10 rounded-full text-4xl font-black shadow-2xl active:scale-95 transition-all">START TRAINING</button>
    </div>

    <aside class="ipad-sidebar flex flex-col p-6 text-white z-50 overflow-y-auto">
        <h2 class="text-2xl font-black mb-4 italic text-yellow-400 text-center border-b border-gray-700 pb-4">TRAINER HUB</h2>
        
        <div class="space-y-6 mb-8">
            <div class="bg-black/40 p-4 rounded-3xl border border-gray-600">
                <label class="text-gray-400 text-[10px] font-bold uppercase block mb-2 px-1">Voice Profile</label>
                <select id="voice-select" class="w-full bg-gray-800 text-white p-3 rounded-2xl outline-none font-bold text-sm">
                    <option value="en-US-AvaNeural">👩 Ava (Young)</option>
                    <option value="en-US-AndrewNeural">👨 Andrew (Gentle)</option>
                </select>
            </div>

            <div class="bg-black/40 p-4 rounded-3xl border border-gray-600">
                <label class="text-gray-400 text-[10px] font-bold uppercase block mb-2 px-1">Speech Rate: <span id="rate-display">1.0</span>x</label>
                <input type="range" id="rate-slider" min="0.8" max="1.1" step="0.05" value="1.0" oninput="updateRateDisplay(this.value)" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-red-500">
                <div class="flex justify-between text-[10px] text-gray-500 mt-2">
                    <span>-20%</span><span>Normal</span><span>+10%</span>
                </div>
            </div>
        </div>

        <nav id="nav-container" class="space-y-2">
            </nav>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="h-32 flex justify-between items-center px-12">
            <h3 id="display-title" class="text-5xl font-black text-gray-800 italic uppercase">Category</h3>
            <div id="feedback-box" class="hidden flex items-center gap-4">
                <div id="feedback-text" class="feedback-pop px-8 py-3 rounded-full font-black text-2xl shadow-lg"></div>
                <div class="bg-white px-6 py-3 rounded-full font-black text-2xl border-4 border-yellow-400">Score: <span id="score-val">0</span></div>
            </div>
        </header>

        <div id="grid-container" class="flex-1 overflow-y-auto px-12 pb-24 grid grid-cols-2 xl:grid-cols-3 gap-10"></div>

        <div id="rec-overlay" class="hidden fixed inset-0 z-[1000] bg-white/95 flex flex-col items-center justify-center text-center">
            <div id="rec-timer" class="text-[20rem] font-black text-red-600 leading-none italic">4</div>
            <p id="rec-hint" class="text-4xl font-black text-gray-400 uppercase tracking-widest animate-pulse">System is Listening...</p>
        </div>
    </main>

    <script>
        const CONFIG = { KEY: "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k", REGION: "eastasia" };
        
        // 原始單字清單 (不需手動分類，由引擎處理)
        const RAW_WORDS = [
            'cat', 'bat', 'mat', 'hat', 'fan', 'can', 'pan', 'van', 'map', 'cap', 'tap', 'nap', 'bag', 'tag', 'rag', 'wag', 'ham', 'jam', 'yam', 'dam', 'dad', 'sad', 'mad', 'bad',
            'hen', 'pen', 'ten', 'men', 'red', 'bed', 'jet', 'net', 'wet', 'pet',
            'pig', 'wig', 'dig', 'bin', 'fin', 'pin', 'win', 'sit', 'hit', 'six', 'sick',
            'hot', 'pot', 'cot', 'dot', 'hop', 'mop', 'top', 'cop', 'dog', 'log', 'ox', 'box',
            'duck', 'bus', 'nut', 'bug', 'sun', 'run', 'gun', 'tub', 'cup', 'jug', 'rug',
            'cake', 'lake', 'bake', 'rake', 'fake', 'make', 'take', 'mail', 'tail', 'rain', 'day', 'say',
            'bee', 'tree', 'seed', 'leaf', 'bean', 'meat',
            'bike', 'hike', 'like', 'kite', 'bite', 'ride', 'light', 'night',
            'bone', 'cone', 'rope', 'hope', 'boat', 'coat', 'goat', 'road',
            'blue', 'glue', 'true', 'flute', 'cute', 'duke'
        ];

        let azureConfig = null;
        let globalRecognizer = null;
        let speechRate = 1.0;

        function updateRateDisplay(val) {
            speechRate = parseFloat(val);
            document.getElementById('rate-display').innerText = val;
        }

        // --- 自動歸類引擎 ---
        function classifyWords() {
            const groups = {};
            RAW_WORDS.forEach(word => {
                let type = "short";
                // 簡易規則：含有 magic e, 雙元音, 或特定組合為 Long
                if (word.endsWith('e') && word.length > 3) type = "long";
                if (/(ai|ay|ee|ea|ie|oa|oe|ui|ue|igh)/i.test(word)) type = "long";
                
                // 找出主母音
                let vowel = 'a';
                const match = word.match(/[aeiou]/i);
                if (match) vowel = match[0].toLowerCase();
                
                const key = `${type}-${vowel}`;
                if (!groups[key]) groups[key] = [];
                groups[key].push(word);
            });
            return groups;
        }

        async function ipadMasterLaunch() {
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioCtx();
                if (ctx.state === 'suspended') await ctx.resume();
                await navigator.mediaDevices.getUserMedia({ audio: true });
                azureConfig = SpeechSDK.SpeechConfig.fromSubscription(CONFIG.KEY, CONFIG.REGION);
                document.getElementById('boot-screen').style.display = 'none';
                
                renderSidebar();
                renderGrid('short-a');
            } catch (err) { alert("請確保麥克風已授權"); }
        }

        function renderSidebar() {
            const groups = classifyWords();
            const container = document.getElementById('nav-container');
            container.innerHTML = Object.keys(groups).sort().map(key => `
                <button onclick="renderGrid('${key}')" class="nav-btn w-full p-4 rounded-2xl text-left font-black text-sm italic hover:bg-white/10 uppercase transition-all">
                    ${key.replace('-', ' ')}
                </button>
            `).join('');
        }

        function renderGrid(key) {
            const groups = classifyWords();
            const words = groups[key] || [];
            document.getElementById('display-title').innerText = key.replace('-', ' ');
            
            const container = document.getElementById('grid-container');
            container.innerHTML = words.map(w => `
                <div class="card-pokemon p-12 flex flex-col items-center justify-between">
                    <h4 class="text-8xl font-black text-gray-800 lowercase tracking-tighter">${w}</h4>
                    <div class="w-full mt-10 flex gap-4">
                        <button onclick="startTraining('${w}')" class="flex-1 bg-red-600 text-white py-6 rounded-3xl font-black text-2xl active:scale-95 shadow-lg">練習</button>
                        <button onclick="playSample('${w}')" class="w-24 h-24 bg-gray-100 rounded-3xl flex items-center justify-center text-4xl active:bg-gray-200">🔊</button>
                    </div>
                </div>
            `).join('');
        }

        function playSample(text) {
            azureConfig.speechSynthesisVoiceName = document.getElementById('voice-select').value;
            const syn = new SpeechSDK.SpeechSynthesizer(azureConfig);
            // 套用語速
            const ssml = `<speak version='1.0' xml:lang='en-US'><voice name='${azureConfig.speechSynthesisVoiceName}'><prosody rate='${(speechRate-1)*100}%'>${text}</prosody></voice></speak>`;
            syn.speakSsmlAsync(ssml, () => syn.close());
        }

        // --- 優化錄音：點擊瞬間即啟動預熱 ---
        function startTraining(text) {
            const overlay = document.getElementById('rec-overlay');
            const timer = document.getElementById('rec-timer');
            overlay.classList.remove('hidden');

            // 1. 立即啟動 Azure Recognizer (右上角麥克風圖示會立刻亮起)
            const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
            const pronConfig = new SpeechSDK.PronunciationAssessmentConfig(
                text, 
                SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark,
                SpeechSDK.PronunciationAssessmentGranularity.Phoneme
            );
            
            globalRecognizer = new SpeechSDK.SpeechRecognizer(azureConfig, audioConfig);
            pronConfig.applyTo(globalRecognizer);
            
            // 開始靜默監聽
            globalRecognizer.startContinuousRecognitionAsync();

            // 2. 開始視覺倒數
            let c = 4;
            timer.innerText = c;
            const itv = setInterval(() => {
                c--;
                if(c > 0) {
                    timer.innerText = c;
                } else {
                    clearInterval(itv);
                    overlay.classList.add('hidden');
                    // 3. 倒數結束，停止監聽並獲取結果
                    stopAndScore(text);
                }
            }, 1000);
        }

        function stopAndScore(text) {
            globalRecognizer.recognizeOnceAsync(result => {
                const res = SpeechSDK.PronunciationAssessmentResult.fromResult(result);
                if (res) {
                    showFeedback(res.accuracyScore);
                } else {
                    showFeedback(0, true);
                }
                globalRecognizer.stopContinuousRecognitionAsync();
                globalRecognizer.close();
            });
        }

        function showFeedback(score, noSound = false) {
            const box = document.getElementById('feedback-box');
            const txt = document.getElementById('feedback-text');
            const val = document.getElementById('score-val');
            box.classList.remove('hidden');
            val.innerText = noSound ? "0" : Math.round(score);

            let comment = "Perfect! 🌟";
            let color = "bg-green-500 text-white";
            
            if (noSound) { comment = "No Sound? 💪"; color = "bg-gray-600"; }
            else if (score < 50) { comment = "Try Again! 💪"; color = "bg-red-500"; }
            else if (score < 80) { comment = "Good! 👍"; color = "bg-blue-500"; }

            txt.innerText = comment;
            txt.className = `feedback-pop ${color} px-8 py-3 rounded-full font-black text-2xl shadow-lg`;
            setTimeout(() => { box.classList.add('hidden'); }, 4000);
        }
    </script>
</body>
</html>

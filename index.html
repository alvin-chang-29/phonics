<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Phonics Hero v7.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-cognitiveservices-speech-sdk/1.37.0/microsoft.cognitiveservices.speech.sdk.bundle.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@700&display=swap');
        body { font-family: 'Fredoka', sans-serif; background-color: #FDF4D0; }
        #boot { position: fixed; inset: 0; background: #111; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body class="p-10">

    <div id="boot">
        <h1 class="text-4xl font-bold text-yellow-400 mb-8 tracking-tighter text-center">PHONICS HERO v7.5<br><span class="text-sm text-gray-500 font-normal italic uppercase">System Rescue Mode</span></h1>
        
        <div id="diag" class="mb-10 text-center px-6 py-4 bg-gray-900 rounded-3xl border border-gray-700 max-w-sm">
            <p id="msg" class="text-blue-400 font-mono text-xs">Waiting for User Activation...</p>
        </div>

        <button onclick="rescueLaunch()" class="bg-blue-600 text-white px-12 py-6 rounded-full text-2xl font-bold active:scale-95 transition-all">INITIALIZE ENGINE</button>
    </div>

    <main id="app" class="hidden">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold text-gray-800">TRAINING</h2>
            <div id="score-tag" class="hidden bg-green-500 text-white px-6 py-2 rounded-full font-bold">Score: <span id="val">0</span></div>
        </div>

        <div class="grid grid-cols-2 gap-8">
            <div class="bg-white p-10 rounded-[40px] shadow-lg flex flex-col items-center">
                <span class="text-7xl font-bold text-gray-800 mb-8 italic">cat</span>
                <button onpointerdown="runQuickRecord('cat', this)" class="w-full bg-red-600 text-white py-6 rounded-3xl font-bold text-xl active:bg-red-800">START RECORD</button>
            </div>
            <div class="bg-white p-10 rounded-[40px] shadow-lg flex flex-col items-center">
                <span class="text-7xl font-bold text-gray-800 mb-8 italic">bat</span>
                <button onpointerdown="runQuickRecord('bat', this)" class="w-full bg-red-600 text-white py-6 rounded-3xl font-bold text-xl active:bg-red-800">START RECORD</button>
            </div>
        </div>
    </main>

    <script>
        const KEY = "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k";
        const REGION = "eastasia";
        let config = null;

        async function rescueLaunch() {
            const msg = document.getElementById('msg');
            msg.innerText = "Step 1: Requesting Mic...";
            
            try {
                // 1. 強制喚醒 AudioContext (使用 iPad 偏好的 PointerDown 邏輯)
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                msg.innerText = "✅ Mic Access Granted";
                msg.className = "text-green-400 font-mono text-xs";

                // 2. 初始化 Azure
                config = SpeechSDK.SpeechConfig.fromSubscription(KEY, REGION);
                
                // 3. 進入 App
                document.getElementById('boot').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');

            } catch (err) {
                msg.innerText = "❌ ERROR: " + err.name + "\n" + err.message;
                msg.className = "text-red-500 font-mono text-xs";
                console.error(err);
            }
        }

        function runQuickRecord(text, btn) {
            const original = btn.innerText;
            btn.innerText = "RECORDING...";
            btn.disabled = true;

            const audio = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
            const pron = new SpeechSDK.PronunciationAssessmentConfig(text, 100, 0);
            const rec = new SpeechSDK.SpeechRecognizer(config, audio);
            pron.applyTo(rec);

            rec.recognizeOnceAsync(result => {
                const res = SpeechSDK.PronunciationAssessmentResult.fromResult(result);
                if (res) {
                    document.getElementById('score-tag').classList.remove('hidden');
                    document.getElementById('val').innerText = Math.round(res.accuracyScore);
                }
                btn.innerText = original;
                btn.disabled = false;
                rec.close();
            }, err => {
                alert("Recording Failed: " + err);
                btn.innerText = original;
                btn.disabled = false;
                rec.close();
            });
        }
    </script>
</body>
</html>

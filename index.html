<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PhonicsHero">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/188/188987.png">
    
    <title>Phonics Hero v6.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-cognitiveservices-speech-sdk/1.37.0/microsoft.cognitiveservices.speech.sdk.bundle.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; background-color: #FDF4D0; margin: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .ipad-sidebar { background-color: #2D2D2D; width: 300px; flex-shrink: 0; }
        .active-lesson { background-color: #CC0000 !important; color: white !important; transform: scale(1.05); }
        .card-pokemon { background: white; border-radius: 40px; box-shadow: 0 10px 0 #E5E5E5; border: 2px solid #F3F4F6; transition: 0.2s; }
        #boot-screen { position: fixed; inset: 0; background: #111; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .feedback-pop { animation: popScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popScale { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="h-screen flex">

    <div id="boot-screen">
        <h1 class="text-6xl font-black text-yellow-400 italic mb-4">PHONICS HERO</h1>
        <p class="text-gray-500 font-bold mb-10 text-xl tracking-[0.3em]">VERSION 6.2</p>
        
        <div id="error-diag" class="hidden mb-10 p-8 bg-red-900/40 border-2 border-red-500 rounded-[40px] text-center max-w-lg">
            <h4 class="text-2xl font-black text-red-100 mb-4">Microphone Access Denied!</h4>
            <p class="text-sm text-red-200 leading-relaxed mb-6">
                iPad PWA 模式需要手動授權：<br>
                1. 請先回到 Safari 打開此網址<br>
                2. 點擊「AA」>「網站設定」>「麥克風：允許」<br>
                3. 重新加入主畫面一次
            </p>
            <button onclick="location.reload()" class="bg-white text-black px-10 py-3 rounded-full font-black uppercase text-sm">Retry Diagnosis</button>
        </div>

        <button id="launch-btn" onclick="ipadMasterLaunch()" class="bg-blue-600 text-white px-20 py-10 rounded-full text-4xl font-black shadow-2xl active:scale-95 transition-all">INITIALIZE ENGINE</button>
    </div>

    <aside class="ipad-sidebar flex flex-col p-6 text-white z-50 overflow-y-auto">
        <h2 class="text-2xl font-black mb-6 italic text-yellow-400 text-center border-b border-gray-700 pb-4">TRAINER HUB</h2>
        
        <div class="space-y-6 mb-8">
            <div class="bg-black/40 p-5 rounded-3xl border border-gray-600">
                <label class="text-gray-400 text-[10px] font-black uppercase block mb-3 px-1 tracking-widest">Speed Control: <span id="rate-display" class="text-yellow-400">1.0</span>x</label>
                <input type="range" id="rate-slider" min="0.8" max="1.1" step="0.05" value="1.0" oninput="updateSpeed(this.value)" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-red-500">
                <div class="flex justify-between text-[10px] text-gray-500 mt-2 font-bold uppercase">
                    <span>-20%</span><span>Normal</span><span>+10%</span>
                </div>
            </div>

            <div class="bg-black/40 p-5 rounded-3xl border border-gray-600">
                <label class="text-gray-400 text-[10px] font-black uppercase block mb-3 px-1 tracking-widest">Voice Profile</label>
                <select id="voice-select" class="w-full bg-gray-800 text-white p-3 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-red-500">
                    <option value="en-US-AvaNeural">👩 Ava (Standard)</option>
                    <option value="en-US-AndrewNeural">👨 Andrew (Deep)</option>
                    <option value="en-US-EmmaNeural">👧 Emma (Sweet)</option>
                </select>
            </div>
        </div>

        <nav id="nav-container" class="space-y-3 pr-2">
            </nav>
    </aside>

    <main class="flex-1 flex flex-col relative p-12 overflow-y-auto bg-[#FDF4D0]">
        <header class="h-24 flex justify-between items-center mb-10">
            <h3 id="display-title" class="text-6xl font-black text-gray-800 italic uppercase">Category</h3>
            <div id="feedback-box" class="hidden flex items-center gap-4">
                <div id="feedback-text" class="feedback-pop px-8 py-4 rounded-full font-black text-3xl shadow-xl"></div>
            </div>
        </header>
        <div id="grid-container" class="grid grid-cols-2 xl:grid-cols-3 gap-10 pb-20"></div>
    </main>

    <div id="rec-overlay" class="hidden fixed inset-0 z-[1000] bg-white/95 flex flex-col items-center justify-center">
        <div id="rec-timer" class="text-[22rem] font-black text-red-600 leading-none italic">4</div>
        <p class="text-4xl font-black text-gray-400 uppercase tracking-[0.5em] animate-pulse">System Listening...</p>
    </div>

    <script>
        const CONFIG = { KEY: "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k", REGION: "eastasia" };
        
        // 原始單字清單
        const RAW_WORDS = [
            'cat', 'bat', 'hat', 'cake', 'lake', 'rain', 'day', 'bee', 'seed', 'leaf', 'bike', 'hike', 'light', 'bone', 'cone', 'boat', 'blue', 'glue', 'cute', 'duck', 'bus', 'nut', 'bug', 'sun', 'run', 'mop', 'top', 'pot', 'dog', 'log'
        ];

        let azureConfig = null;
        let globalRecognizer = null;
        let speechRate = 1.0;

        function updateSpeed(val) {
            speechRate = parseFloat(val);
            document.getElementById('rate-display').innerText = val;
        }

        async function ipadMasterLaunch() {
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioCtx();
                if (ctx.state === 'suspended') await ctx.resume();

                await navigator.mediaDevices.getUserMedia({ audio: true });
                azureConfig = SpeechSDK.SpeechConfig.fromSubscription(CONFIG.KEY, CONFIG.REGION);
                
                document.getElementById('boot-screen').style.display = 'none';
                renderSidebar();
                renderGrid('short-a');
            } catch (err) {
                document.getElementById('error-diag').classList.remove('hidden');
                document.getElementById('launch-btn').classList.add('hidden');
            }
        }

        // --- 自動分類引擎 (分類成 short-a, long-a 等) ---
        function classify() {
            const groups = {};
            RAW_WORDS.forEach(w => {
                let type = "short";
                if (w.endsWith('e') && w.length > 3) type = "long";
                if (/(ai|ay|ee|ea|oa|ui|ue|igh)/i.test(w)) type = "long";
                const vowel = (w.match(/[aeiou]/i) || ['a'])[0].toLowerCase();
                const key = `${type}-${vowel}`;
                if (!groups[key]) groups[key] = [];
                groups[key].push(w);
            });
            return groups;
        }

        function renderSidebar() {
            const groups = classify();
            const container = document.getElementById('nav-container');
            container.innerHTML = Object.keys(groups).sort().map(key => `
                <button onclick="renderGrid('${key}', this)" class="nav-btn w-full p-5 rounded-[25px] text-left font-black text-lg italic hover:bg-white/10 uppercase transition-all">
                    ${key.replace('-', ' ')}
                </button>
            `).join('');
            container.querySelector('.nav-btn').classList.add('active-lesson');
        }

        function renderGrid(key, btn) {
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-lesson'));
                btn.classList.add('active-lesson');
            }
            const groups = classify();
            const words = groups[key] || [];
            document.getElementById('display-title').innerText = key.replace('-', ' ');
            const container = document.getElementById('grid-container');
            container.innerHTML = words.map(w => `
                <div class="card-pokemon p-12 flex flex-col items-center">
                    <h4 class="text-8xl font-black text-gray-800 lowercase mb-12">${w}</h4>
                    <div class="w-full flex gap-5">
                        <button onclick="startTraining('${w}')" class="flex-1 bg-red-600 text-white py-7 rounded-[30px] font-black text-3xl active:scale-95 shadow-lg">練習</button>
                        <button onclick="playSample('${w}')" class="w-24 h-24 bg-gray-100 rounded-[30px] flex items-center justify-center text-5xl active:bg-gray-200 transition">🔊</button>
                    </div>
                </div>
            `).join('');
        }

        function playSample(text) {
            const voice = document.getElementById('voice-select').value;
            const syn = new SpeechSDK.SpeechSynthesizer(azureConfig);
            // 語速 SSML 轉換
            const ratePercent = Math.round((speechRate - 1) * 100);
            const ssml = `<speak version='1.0' xml:lang='en-US'><voice name='${voice}'><prosody rate='${ratePercent}%'>${text}</prosody></voice></speak>`;
            syn.speakSsmlAsync(ssml, () => syn.close());
        }

        function startTraining(text) {
            const overlay = document.getElementById('rec-overlay');
            const timer = document.getElementById('rec-timer');
            overlay.classList.remove('hidden');

            // --- 預熱錄音：倒數一開始就亮麥克風 ---
            const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
            const pronConfig = new SpeechSDK.PronunciationAssessmentConfig(text, SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark, SpeechSDK.PronunciationAssessmentGranularity.Phoneme);
            globalRecognizer = new SpeechSDK.SpeechRecognizer(azureConfig, audioConfig);
            pronConfig.applyTo(globalRecognizer);
            globalRecognizer.startContinuousRecognitionAsync();

            let c = 4;
            timer.innerText = c;
            const itv = setInterval(() => {
                c--;
                if(c > 0) timer.innerText = c;
                else {
                    clearInterval(itv);
                    overlay.classList.add('hidden');
                    // 倒數結束即進行評分
                    globalRecognizer.recognizeOnceAsync(result => {
                        const res = SpeechSDK.PronunciationAssessmentResult.fromResult(result);
                        showFeedback(res ? res.accuracyScore : 0, !res);
                        globalRecognizer.close();
                    });
                }
            }, 1000);
        }

        function showFeedback(score, noSound) {
            const box = document.getElementById('feedback-box');
            const txt = document.getElementById('feedback-text');
            const val = document.getElementById('score-val');
            box.classList.remove('hidden');
            val.innerText = noSound ? "0" : Math.round(score);

            let comment = score > 80 ? "Perfect! 🌟" : "Try Again! 💪";
            let color = score > 80 ? "bg-green-500 text-white" : "bg-red-500 text-white";
            if(noSound) { comment = "No Sound? 🔊"; color = "bg-gray-600 text-white"; }

            txt.innerText = comment;
            txt.className = `feedback-pop px-10 py-4 rounded-full font-black text-3xl shadow-xl ${color}`;
            
            // 評價語音回饋
            const syn = new SpeechSDK.SpeechSynthesizer(azureConfig);
            syn.speakTextAsync(noSound ? "Try again." : (score > 80 ? "Excellent!" : "Keep going!"), () => syn.close());
            
            setTimeout(() => box.classList.add('hidden'), 4000);
        }
    </script>
</body>
</html>

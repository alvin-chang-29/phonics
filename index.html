<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Phonics v6.0.3-Diagnostic</title>
    <script src="azure.sdk.js"></script>
    <style>
        :root { --blue: #007AFF; --red: #FF3B30; --bg: #F2F2F7; }
        body { font-family: -apple-system; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .version { position: absolute; top: 40px; font-size: 11px; color: #8E8E93; }
        .card { width: 85%; max-width: 400px; background: white; padding: 30px; border-radius: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .word { font-size: 60px; font-weight: 800; margin: 10px 0; }
        #recordBtn { width: 120px; height: 120px; border-radius: 50%; border: none; background: var(--blue); color: white; font-size: 20px; font-weight: 700; margin-top: 20px; }
        #recordBtn.listening { background: var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        /* 音量診斷條 */
        .vol-meter { width: 100%; height: 10px; background: #EEE; border-radius: 5px; margin-top: 20px; overflow: hidden; }
        #volLevel { width: 0%; height: 100%; background: var(--blue); transition: width 0.1s; }
        .status { margin-top: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="version">v6.0.3-Diagnostic-Build</div>
    <div class="card">
        <div id="wd" class="word">cat</div>
        <div id="sc" style="font-size: 40px; font-weight: bold;"></div>
        <div class="vol-meter"><div id="volLevel"></div></div>
        <div id="st" class="status">按住 PUSH 開始說話</div>
    </div>
    <button id="recordBtn">PUSH</button>

<script>
    const CONFIG = {
        key: "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k",
        region: "eastasia"
    };

    let audioContext, analyser, dataArray, source, animationId;

    // 1. 診斷功能：監測音量
    function startLevelMeter(stream) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        source = audioContext.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        function draw() {
            analyser.getByteFrequencyData(dataArray);
            let avg = dataArray.reduce((a, b) => a + b) / dataArray.length;
            document.getElementById('volLevel').style.width = Math.min(avg * 2, 100) + "%";
            animationId = requestAnimationFrame(draw);
        }
        draw();
    }

    // 2. 核心辨識
    async function runAssessment() {
        const st = document.getElementById('st');
        const btn = document.getElementById('recordBtn');
        btn.classList.add('listening');
        st.innerText = "偵測聲音中...";

        try {
            // iPad PWA 必須顯式請求特定的採樣率
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { sampleRate: 16000, channelCount: 1 } 
            });
            
            startLevelMeter(stream); // 啟動音量條

            const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(CONFIG.key, CONFIG.region);
            const audioConfig = SpeechSDK.AudioConfig.fromMicrophoneInput(stream.id);
            const pronConfig = new SpeechSDK.PronunciationAssessmentConfig(
                document.getElementById('wd').innerText,
                SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark,
                SpeechSDK.PronunciationAssessmentGranularity.Phoneme
            );

            const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
            pronConfig.applyTo(recognizer);

            recognizer.recognizeOnceAsync(result => {
                cancelAnimationFrame(animationId);
                stream.getTracks().forEach(t => t.stop());
                btn.classList.remove('listening');

                if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
                    const res = SpeechSDK.PronunciationAssessmentResult.fromResult(result);
                    document.getElementById('sc').innerText = Math.round(res.accuracyScore);
                    st.innerText = "完成！";
                } else {
                    st.innerText = "未偵測到有效聲音 (Reason: " + result.reason + ")";
                }
                recognizer.close();
            });

        } catch (err) {
            st.innerText = "錯誤: " + err.message;
            btn.classList.remove('listening');
        }
    }

    document.getElementById('recordBtn').onpointerdown = (e) => {
        e.preventDefault();
        runAssessment();
    };
</script>
</body>
</html>

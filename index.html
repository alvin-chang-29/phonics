<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Phonics Hero v7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-cognitiveservices-speech-sdk/1.37.0/microsoft.cognitiveservices.speech.sdk.bundle.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; background-color: #FDF4D0; margin: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .ipad-sidebar { background-color: #2D2D2D; width: 280px; flex-shrink: 0; }
        .active-lesson { background-color: #CC0000 !important; color: white !important; }
        .card-pokemon { background: white; border-radius: 40px; box-shadow: 0 10px 0 #E5E5E5; border: 2px solid #F3F4F6; }
        #boot-screen { position: fixed; inset: 0; background: #111; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body class="h-screen flex">

    <div id="boot-screen">
        <h1 class="text-6xl font-black text-yellow-400 italic mb-4">PHONICS HERO</h1>
        <p class="text-gray-500 font-bold mb-10 text-xl tracking-[0.3em]">VERSION 7.0 - STREAM FIX</p>
        <button onclick="ipadMasterLaunch()" class="bg-blue-600 text-white px-20 py-10 rounded-full text-4xl font-black shadow-2xl active:scale-95 transition-all">START TRAINING</button>
    </div>

    <aside class="ipad-sidebar flex flex-col p-6 text-white z-50">
        <h2 class="text-2xl font-black mb-6 italic text-yellow-400 text-center border-b border-gray-700 pb-4">TRAINER</h2>
        <div class="space-y-6 mb-8">
            <div class="bg-black/40 p-4 rounded-3xl border border-gray-600">
                <label class="text-gray-400 text-[10px] font-bold block mb-2 px-1 uppercase">Speed: <span id="rate-display">1.0</span>x</label>
                <input type="range" id="rate-slider" min="0.8" max="1.1" step="0.05" value="1.0" oninput="updateSpeed(this.value)" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-red-500">
            </div>
            <select id="voice-select" class="w-full bg-gray-800 text-white p-3 rounded-2xl outline-none font-bold text-sm">
                <option value="en-US-AvaNeural">Ava</option>
                <option value="en-US-AndrewNeural">Andrew</option>
            </select>
        </div>
        <nav id="nav-container" class="space-y-3 overflow-y-auto"></nav>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto relative">
        <header class="h-24 flex justify-between items-center mb-10">
            <h3 id="display-title" class="text-5xl font-black text-gray-800 italic uppercase">Category</h3>
            <div id="feedback-box" class="hidden flex items-center gap-4">
                <div id="feedback-text" class="px-8 py-3 rounded-full font-black text-2xl shadow-lg"></div>
                <div class="bg-white px-4 py-2 rounded-full font-black text-xl border-4 border-yellow-400"><span id="score-val">--</span></div>
            </div>
        </header>
        <div id="grid-container" class="grid grid-cols-2 xl:grid-cols-3 gap-10"></div>
    </main>

    <script>
        const AZURE = { KEY: "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k", REGION: "eastasia" };
        const WORDS = ['cat', 'bat', 'hat', 'cake', 'lake', 'rain', 'bee', 'seed', 'bike', 'hike', 'bone', 'cone', 'blue', 'glue', 'duck', 'bus', 'sun', 'mop', 'top', 'pot'];
        
        let speechConfig = null;
        let speechRate = 1.0;
        let micStream = null;

        function updateSpeed(v) { speechRate = v; document.getElementById('rate-display').innerText = v; }

        async function ipadMasterLaunch() {
            try {
                // 1. 取得音訊串流並保持活動
                micStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    } 
                });
                
                speechConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE.KEY, AZURE.REGION);
                // 強制設定識別語言，減少判斷延遲
                speechConfig.speechRecognitionLanguage = "en-US";
                
                document.getElementById('boot-screen').style.display = 'none';
                renderSidebar();
                renderGrid('short-a');
            } catch (err) {
                alert("啟動錯誤: " + err.message);
            }
        }

        function classify() {
            const groups = {};
            WORDS.forEach(w => {
                const type = (w.endsWith('e') && w.length > 3) || /(ai|ay|ee|ea|oa|ui|ue)/i.test(w) ? "long" : "short";
                const vowel = (w.match(/[aeiou]/i) || ['a'])[0].toLowerCase();
                const key = `${type}-${vowel}`;
                if (!groups[key]) groups[key] = [];
                groups[key].push(w);
            });
            return groups;
        }

        function renderSidebar() {
            const groups = classify();
            const container = document.getElementById('nav-container');
            container.innerHTML = Object.keys(groups).sort().map(key => `
                <button onclick="renderGrid('${key}', this)" class="nav-btn w-full p-4 rounded-2xl text-left font-black text-sm uppercase transition-all">
                    ${key.replace('-', ' ')}
                </button>
            `).join('');
            if(container.firstChild) container.firstChild.classList.add('active-lesson');
        }

        function renderGrid(key, btn) {
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-lesson'));
                btn.classList.add('active-lesson');
            }
            document.getElementById('display-title').innerText = key.replace('-', ' ');
            const container = document.getElementById('grid-container');
            container.innerHTML = classify()[key].map(w => `
                <div class="card-pokemon p-12 flex flex-col items-center">
                    <h4 class="text-8xl font-black text-gray-800 lowercase mb-10">${w}</h4>
                    <div class="w-full flex gap-4">
                        <button onclick="startTraining('${w}', this)" class="flex-1 bg-red-600 text-white py-6 rounded-3xl font-black text-2xl active:scale-95 shadow-lg">練習</button>
                        <button onclick="playVoice('${w}')" class="w-24 h-24 bg-gray-100 rounded-3xl flex items-center justify-center text-4xl">🔊</button>
                    </div>
                </div>
            `).join('');
        }

        function playVoice(text) {
            const voice = document.getElementById('voice-select').value;
            const syn = new SpeechSDK.SpeechSynthesizer(speechConfig);
            const rate = Math.round((speechRate - 1) * 100);
            const ssml = `<speak version='1.0' xml:lang='en-US'><voice name='${voice}'><prosody rate='${rate}%'>${text}</prosody></voice></speak>`;
            syn.speakSsmlAsync(ssml, () => syn.close(), () => syn.close());
        }

        // --- v7.0 核心修正：手動指定音訊配置 ---
        function startTraining(text, btn) {
            const originalText = btn.innerText;
            btn.innerText = "Listening...";
            btn.disabled = true;
            btn.classList.replace('bg-red-600', 'bg-orange-500');

            // 使用現有的串流建立音訊配置，這可以繞過 iOS 的重新授權檢查
            const audioConfig = SpeechSDK.AudioConfig.fromMicrophoneInput(micStream.id);
            const pronConfig = new SpeechSDK.PronunciationAssessmentConfig(
                text, 
                SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark, 
                SpeechSDK.PronunciationAssessmentGranularity.Phoneme
            );
            
            const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
            pronConfig.applyTo(recognizer);

            recognizer.recognizeOnceAsync(result => {
                const res = SpeechSDK.PronunciationAssessmentResult.fromResult(result);
                showFeedback(res ? res.accuracyScore : 0);
                
                btn.innerText = originalText;
                btn.disabled = false;
                btn.classList.replace('bg-orange-500', 'bg-red-600');
                recognizer.close();
            }, err => {
                btn.innerText = originalText;
                btn.disabled = false;
                btn.classList.replace('bg-orange-500', 'bg-red-600');
                recognizer.close();
            });
        }

        function showFeedback(score) {
            const box = document.getElementById('feedback-box');
            const txt = document.getElementById('feedback-text');
            const val = document.getElementById('score-val');
            box.classList.remove('hidden');
            val.innerText = Math.round(score);
            const isGood = score > 70; // 稍微放寬標準
            txt.innerText = isGood ? "Perfect! 🌟" : "Try Again! 💪";
            txt.className = `px-8 py-3 rounded-full font-black text-2xl shadow-lg ${isGood ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            
            const syn = new SpeechSDK.SpeechSynthesizer(speechConfig);
            syn.speakTextAsync(isGood ? "Good job!" : "Try again", () => syn.close());
            setTimeout(() => box.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>

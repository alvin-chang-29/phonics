<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Phonics Master Custom</title>
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- 🎨 模組化外觀設定區 --- */
        :root {
            --primary-bg: #fdf6e3;       /* 頁面大背景色 */
            --sidebar-color: #EE1515;    /* 側邊欄顏色 (預設寶可夢紅) */
            --card-border: #FFDE00;      /* 字卡邊框顏色 (預設皮卡丘黃) */
            --text-color: #3B4CCA;       /* 單字文字顏色 (預設寶可夢藍) */
            
            /* 按鈕圖片模組 */
            --mic-icon: url('https://img.icons8.com/color/96/pokeball.png'); /* 錄音鈕圖片 */
            --play-icon: "🔊"; /* 播放圖示 */
        }

        body { background: var(--primary-bg); font-family: -apple-system, sans-serif; overflow: hidden; }
        .app-container { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
        
        .sidebar { background: var(--sidebar-color); border-right: 8px solid rgba(0,0,0,0.1); }
        .main-content { padding: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; overflow-y: auto; }

        /* 模組化字卡 */
        .custom-card { 
            background: white; 
            border: 12px solid var(--card-border); 
            border-radius: 40px; 
            padding: 40px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .word-text { font-size: 6rem; font-weight: 900; color: var(--text-color); text-transform: uppercase; }

        /* 模組化按鈕 */
        .mic-module {
            width: 80px; height: 80px;
            background-image: var(--mic-icon);
            background-size: contain;
            background-repeat: no-repeat;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .mic-module:active { transform: scale(0.8); }
        .recording .mic-module { animation: shake 0.5s infinite; }

        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar p-6 text-white">
        <h2 class="text-2xl font-black mb-10 text-center">MENU</h2>
        <div id="unit-menu" class="space-y-4"></div>
    </aside>

    <main class="main-content" id="main-display"></main>
</div>

<script>
    /* --- 🖼️ 圖片模組設定 --- */
    const UI_CONFIG = {
        // 您可以換成任何圖片的網址
        backgroundImg: "https://www.transparenttextures.com/patterns/cubes.png", 
        successIcon: "🌟",
        failIcon: "❌"
    };

    const azureKey = "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k";
    const azureRegion = "eastasia";
    let isRecording = false;

    // 您可以在這裡隨時新增或修改教材內容
    const wordData = {
        shortA: { label: 'Short A', icon: '🍎', data: [{word:'Cat'},{word:'Bag'},{word:'Bat'}] },
        longA: { label: 'Long A', icon: '🍰', data: [{word:'Cake'},{word:'Lake'}] }
    };

    function renderMain(unitKey = 'shortA') {
        const display = document.getElementById('main-display');
        display.innerHTML = wordData[unitKey].data.map((item, i) => `
            <div class="custom-card" id="card-${i}">
                <div onclick="speak('${item.word}')">
                    <h2 class="word-text">${item.word}</h2>
                    <p class="text-gray-400 font-bold">MODE: ${wordData[unitKey].label}</p>
                </div>
                <div class="mt-12 flex justify-between items-center">
                    <div id="fb-${i}" class="text-2xl font-black text-gray-300">READY?</div>
                    <div onclick="startEval('${item.word}', ${i})" class="mic-module"></div>
                </div>
            </div>
        `).join('');
    }

    function speak(text) {
        const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(azureKey, azureRegion);
        speechConfig.speechSynthesisVoiceName = "en-US-AvaNeural";
        const synthesizer = new SpeechSDK.SpeechSynthesizer(speechConfig);
        synthesizer.speakTextAsync(text, r => synthesizer.close());
    }

    async function startEval(word, index) {
        if(isRecording) return;
        isRecording = true;
        const card = document.getElementById(`card-${index}`);
        const fb = document.getElementById(`fb-${index}`);
        card.classList.add('recording');

        const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(azureKey, azureRegion);
        const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
        const pronConfig = new SpeechSDK.PronunciationAssessmentConfig(word, 100, 0);
        const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
        pronConfig.applyTo(recognizer);

        recognizer.recognizeOnceAsync(result => {
            const score = SpeechSDK.PronunciationAssessmentResult.fromResult(result).accuracyScore;
            card.classList.remove('recording');
            fb.innerHTML = score >= 80 ? `<span class="text-green-600">${UI_CONFIG.successIcon} GREAT!</span>` : `<span class="text-red-500">${UI_CONFIG.failIcon} AGAIN</span>`;
            isRecording = false;
            recognizer.close();
        });
    }

    // 初始化選單
    document.getElementById('unit-menu').innerHTML = Object.keys(wordData).map(key => `
        <button onclick="renderMain('${key}')" class="w-full py-4 bg-white text-black rounded-2xl font-bold shadow-lg">${wordData[key].icon} ${wordData[key].label}</button>
    `).join('');

    renderMain();
</script>
</body>
</html>

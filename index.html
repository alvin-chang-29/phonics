<!DOCTYPE html><html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Phonics Master - Mic Fix</title>
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fdf6e3; }
        .active-unit { background-color: #fef3c7; border-color: #f59e0b; color: #b45309; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #f59e0b; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .voice-btn { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; background: #f3f4f6; color: #6b7280; }
        .voice-btn-active { background-color: #f59e0b; color: white; }
    </style></head><body class="bg-slate-50 h-screen overflow-hidden flex flex-col">

    <div id="setup-overlay" class="fixed inset-0 bg-amber-500 z-50 flex flex-col items-center justify-center p-10 text-white text-center">
        <h2 class="text-3xl font-bold mb-6">麥克風強化版本</h2>
        <button onclick="initApp()" class="bg-white text-amber-600 px-12 py-4 rounded-full font-black text-xl shadow-2xl">啟動系統</button>
    </div>

    <header class="bg-white pt-12 pb-4 px-6 shadow-sm border-b">
        <div class="flex justify-between items-start">
            <h1 class="text-xl font-bold text-slate-800">Phonics Pro</h1>
            <div id="unit-display" class="bg-amber-500 text-white px-2 py-1 rounded text-xs font-bold">Short A</div>
        </div>
        <div class="flex gap-2 mt-3">
            <button onclick="changeVoice('en-US-AvaNeural')" id="v-en-US-AvaNeural" class="voice-btn voice-btn-active">Ava</button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 space-y-3" id="app-content"></main>
    <div class="bg-white border-t p-4 flex gap-3 overflow-x-auto" id="nav-bar"></div>

    <script>
        const subscriptionKey = "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k";
        const serviceRegion = "eastasia";
        let currentVoice = "en-US-AvaNeural";
        let isRecording = false;

        const wordData = {
            shortA: { label: 'Short A', icon: '🍎', data: [{word:'ant',family:'ant'},{word:'cat',family:'at'},{word:'bag',family:'ag'}]},
            longA: { label: 'Long A', icon: '🍰', data: [{word:'cake',family:'a-e'},{word:'rain',family:'ai'}]}
        };
        let currentKey = 'shortA';

        function initApp() {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(() => {
                document.getElementById('setup-overlay').style.display = 'none';
                renderApp();
            });
        }

        function playSound(text) {
            if(isRecording) return;
            const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(subscriptionKey, serviceRegion);
            speechConfig.speechSynthesisVoiceName = currentVoice;
            new SpeechSDK.SpeechSynthesizer(speechConfig).speakTextAsync(text);
        }

        async function startAzureEval(targetWord, index) {
            if(isRecording) return;
            isRecording = true;
            
            const statusIcon = document.getElementById(`status-${index}`);
            const fb = document.getElementById(`feedback-${index}`);
            
            statusIcon.innerHTML = '<div class="spinner"></div>';
            fb.innerText = "Mic Warming Up...";
            fb.className = "text-[10px] text-blue-500 font-bold mt-2";

            const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(subscriptionKey, serviceRegion);
            const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
            const pronConfig = new SpeechSDK.PronunciationAssessmentConfig(targetWord, 100, 0);
            const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
            pronConfig.applyTo(recognizer);

            // 延遲 0.5 秒再開始倒數，確保麥克風已就緒
            setTimeout(() => {
                let timeLeft = 3;
                fb.innerText = "NOW SPEAK!";
                fb.className = "text-[10px] text-red-600 font-black mt-2 animate-pulse";
                
                const timer = setInterval(() => {
                    timeLeft--;
                    if(timeLeft > 0) fb.innerText = `Listening... ${timeLeft}s`;
                    if(timeLeft <= 0) clearInterval(timer);
                }, 1000);

                recognizer.recognizeOnceAsync(result => {
                    clearInterval(timer);
                    if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
                        const score = SpeechSDK.PronunciationAssessmentResult.fromResult(result).accuracyScore;
                        if (score >= 80) {
                            statusIcon.innerHTML = '✅';
                            fb.innerText = `Perfect! (${Math.round(score)})`;
                            fb.className = "text-[10px] text-green-600 font-bold mt-2";
                        } else {
                            statusIcon.innerHTML = '🎤';
                            fb.innerText = "Try again!";
                            fb.className = "text-[10px] text-orange-500 font-bold mt-2";
                        }
                    } else {
                        statusIcon.innerHTML = '🎤';
                        fb.innerText = "Not heard. Speak louder!";
                        fb.className = "text-[10px] text-red-500 font-bold mt-2";
                    }
                    recognizer.close();
                    isRecording = false;
                });
            }, 500); 
        }

        function renderApp() {
            const container = document.getElementById('app-content');
            container.innerHTML = wordData[currentKey].data.map((item, i) => `
                <div class="bg-white rounded-2xl p-5 mb-3 shadow-sm border-l-4 border-amber-400 flex justify-between items-center">
                    <div class="flex-1" onclick="playSound('${item.word}')">
                        <h2 class="text-4xl font-black text-slate-800">${item.word.toLowerCase()}</h2>
                        <p class="text-gray-400 text-xs italic">-${item.family} family</p>
                    </div>
                    <div class="flex flex-col items-center min-w-[110px]">
                        <button id="status-${i}" onclick="startAzureEval('${item.word}', ${i})" class="bg-slate-100 w-14 h-14 rounded-full flex items-center justify-center text-2xl shadow-inner active:bg-amber-100 transition-colors">🎤</button>
                        <div id="feedback-${i}" class="text-[10px] text-gray-300 font-bold mt-2">Tap mic</div>
                    </div>
                </div>`).join('');

            document.getElementById('nav-bar').innerHTML = Object.keys(wordData).map(key => `
                <button onclick="switchUnit('${key}')" class="flex-shrink-0 flex flex-col items-center px-4 py-2 rounded-xl border ${currentKey === key ? 'active-unit' : 'border-transparent text-gray-400'}">
                    <span class="text-xl">${wordData[key].icon}</span><span class="text-[10px] font-bold">${wordData[key].label}</span>
                </button>`).join('');
            document.getElementById('unit-display').innerText = wordData[currentKey].label;
        }
        function switchUnit(key) { currentKey = key; renderApp(); }
    </script></body></html>

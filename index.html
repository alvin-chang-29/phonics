<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Phonics Hero v3.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="azure-sdk" src="https://aka.ms/csspeechjs-browser-sdk"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; -webkit-user-select: none; background-color: #FDF4D0; margin: 0; }
        .ipad-sidebar { background-color: rgba(45, 45, 45, 0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .active-lesson { background-color: #CC0000 !important; color: white !important; }
        .card-pokemon { background: white; border-radius: 40px; box-shadow: 0 12px 0px #E5E5E5; border: 2px solid #F3F4F6; }
        #boot-screen { position: fixed; inset: 0; background: #111111; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div id="boot-screen">
        <h1 class="text-6xl font-black text-yellow-400 italic mb-6">PHONICS HERO</h1>
        <div id="loading-msg" class="text-blue-400 mb-8 font-bold animate-pulse">Checking SDK...</div>
        <button id="master-btn" onclick="ipadMasterUnlock()" class="hidden bg-blue-600 text-white px-20 py-10 rounded-full text-4xl font-black shadow-2xl active:scale-95 transition-all">
            INITIALIZE SYSTEM
        </button>
        <p id="init-status" class="mt-8 text-gray-500 font-bold uppercase tracking-widest text-sm">v3.7 Stable</p>
    </div>

    <aside class="w-80 ipad-sidebar flex flex-col z-50">
        <div class="p-8 border-b border-gray-700">
            <h2 class="text-white text-3xl font-black italic">TRAINER</h2>
            <select id="voice-select" class="w-full mt-4 bg-gray-800 text-white p-4 rounded-2xl border-2 border-gray-600 font-bold">
                <option value="en-US-AvaNeural">Ava</option>
                <option value="en-US-AndrewNeural">Andrew</option>
            </select>
        </div>
        <nav class="flex-1 p-6 space-y-3 overflow-y-auto">
            <button onclick="changeCat('short-a', this)" class="nav-item active-lesson w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl">🍎 Short A</button>
            <button onclick="changeCat('short-e', this)" class="nav-item w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl">🍳 Short E</button>
            <button onclick="changeCat('short-i', this)" class="nav-item w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl">🧊 Short I</button>
            <button onclick="changeCat('short-o', this)" class="nav-item w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl">🐙 Short O</button>
            <button onclick="changeCat('short-u', this)" class="nav-item w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl">☔ Short U</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="h-32 flex justify-between items-center px-12">
            <h3 id="display-title" class="text-5xl font-black text-gray-800 italic uppercase">Short A</h3>
            <div id="score-ring" class="hidden bg-green-500 text-white px-10 py-4 rounded-full font-black text-2xl animate-bounce">SCORE: <span id="last-score">0</span></div>
        </header>
        <div id="grid-container" class="flex-1 overflow-y-auto px-12 pb-24 grid grid-cols-2 gap-10"></div>
    </main>

    <div id="rec-overlay" class="hidden fixed inset-0 z-[999] bg-white/95 flex flex-col items-center justify-center">
        <div id="rec-timer" class="text-[20rem] font-black text-red-600 leading-none italic">4</div>
    </div>

    <script>
        const AZURE_KEY = "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k";
        const REGION = "eastasia";
        
        // 偵測 SDK 是否載入
        function checkSDK() {
            if (typeof SpeechSDK !== 'undefined') {
                document.getElementById('loading-msg').classList.add('hidden');
                document.getElementById('master-btn').classList.remove('hidden');
            } else {
                document.getElementById('loading-msg').innerText = "SDK Loading... (Please Wait)";
                setTimeout(checkSDK, 500);
            }
        }
        window.onload = checkSDK;

        const words = [
            {t:'cat',c:'short-a'},{t:'bat',c:'short-a'},{t:'mat',c:'short-a'},{t:'hat',c:'short-a'},
            {t:'hen',c:'short-e'},{t:'pen',c:'short-e'},{t:'ten',c:'short-e'},{t:'bed',c:'short-e'},
            {t:'pig',c:'short-i'},{t:'wig',c:'short-i'},{t:'fin',c:'short-i'},{t:'sit',c:'short-i'},
            {t:'hot',c:'short-o'},{t:'pot',c:'short-o'},{t:'dog',c:'short-o'},{t:'log',c:'short-o'},
            {t:'sun',c:'short-u'},{t:'run',c:'short-u'},{t:'bug',c:'short-u'},{t:'nut',c:'short-u'}
        ];

        let sdkConfig = null;

        async function ipadMasterUnlock() {
            try {
                // 解鎖音訊
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                if (ctx.state === 'suspended') await ctx.resume();

                // 請求權限
                await navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => {
                    alert("請在 Safari 設定中允許麥克風，否則無法錄音。");
                });

                // 初始化 Azure
                sdkConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, REGION);
                sdkConfig.speechSynthesisVoiceName = document.getElementById('voice-select').value;

                const syn = new SpeechSDK.SpeechSynthesizer(sdkConfig);
                syn.speakTextAsync("", () => {
                    syn.close();
                    document.getElementById('boot-screen').style.display = 'none';
                    renderGrid('short-a');
                });
            } catch (err) {
                alert("初始化失敗：" + err.message);
            }
        }

        function changeCat(cat, btn) {
            document.getElementById('display-title').innerText = cat.replace('-', ' ');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-lesson'));
            btn.classList.add('active-lesson');
            renderGrid(cat);
        }

        function renderGrid(cat) {
            const container = document.getElementById('grid-container');
            const filtered = words.filter(w => w.c === cat);
            container.innerHTML = filtered.map(w => `
                <div class="card-pokemon p-12 flex flex-col items-center">
                    <h4 class="text-8xl font-black text-gray-800 lowercase">${w.t}</h4>
                    <div class="w-full mt-10 flex gap-4">
                        <button onclick="startiPadRec('${w.t}')" class="flex-1 bg-red-600 text-white py-6 rounded-3xl font-black text-2xl active:scale-95">練習</button>
                        <button onclick="playVoice('${w.t}')" class="w-24 h-24 bg-gray-100 rounded-3xl flex items-center justify-center text-4xl active:bg-gray-200">🔊</button>
                    </div>
                </div>
            `).join('');
        }

        function playVoice(text) {
            sdkConfig.speechSynthesisVoiceName = document.getElementById('voice-select').value;
            const syn = new SpeechSDK.SpeechSynthesizer(sdkConfig);
            syn.speakTextAsync(text, () => syn.close(), () => syn.close());
        }

        function startiPadRec(text) {
            const overlay = document.getElementById('rec-overlay');
            overlay.classList.remove('hidden');
            let count = 4;
            document.getElementById('rec-timer').innerText = count;
            const cd = setInterval(() => {
                count--;
                if (count > 0) document.getElementById('rec-timer').innerText = count;
                else {
                    clearInterval(cd);
                    overlay.classList.add('hidden');
                    runAssessment(text);
                }
            }, 1000);
        }

        function runAssessment(text) {
            const audio = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
            const pron = new SpeechSDK.PronunciationAssessmentConfig(text, 100, 0);
            const rec = new SpeechSDK.SpeechRecognizer(sdkConfig, audio);
            pron.applyTo(rec);
            rec.recognizeOnceAsync(res => {
                const result = SpeechSDK.PronunciationAssessmentResult.fromResult(res);
                if (result) {
                    document.getElementById('last-score').innerText = Math.round(result.accuracyScore);
                    document.getElementById('score-ring').classList.remove('hidden');
                    setTimeout(() => document.getElementById('score-ring').classList.add('hidden'), 3000);
                }
                rec.close();
            }, () => rec.close());
        }
    </script>
</body>
</html>

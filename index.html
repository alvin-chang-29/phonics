<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Phonics v6.0.5-Debug</title>
    <script src="azure.sdk.js"></script>
    <style>
        :root { --blue: #007AFF; --red: #FF3B30; --bg: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding-top: 60px; margin: 0; overflow: hidden; }
        .version { font-size: 11px; color: #8E8E93; margin-bottom: 10px; }
        .card { width: 85%; max-width: 400px; background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .word { font-size: 56px; font-weight: 800; margin: 5px 0; }
        .vol-meter { width: 100%; height: 8px; background: #EEE; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        #volLevel { width: 0%; height: 100%; background: var(--blue); }
        #recordBtn { width: 110px; height: 110px; border-radius: 50%; border: none; background: var(--blue); color: white; font-size: 18px; font-weight: 700; margin: 20px 0; touch-action: none; }
        #recordBtn.listening { background: var(--red); }
        /* Debug Console 樣式 */
        #debugConsole { width: 85%; max-width: 400px; height: 120px; background: #1C1C1E; color: #32D74B; font-family: monospace; font-size: 10px; padding: 10px; margin-top: 20px; border-radius: 10px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>
    <div class="version">v6.0.5-Debug-Console</div>
    <div class="card">
        <div id="wd" class="word">cat</div>
        <div id="sc" style="font-size: 32px; font-weight: bold; color: var(--blue);"></div>
        <div class="vol-meter"><div id="volLevel"></div></div>
        <div id="st" style="font-size: 14px; color: #666;">Ready</div>
    </div>
    <button id="recordBtn">PUSH</button>
    <div id="debugConsole">--- Debug Log ---<br></div>

<script>
    const CONFIG = {
        key: "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k",
        region: "eastasia"
    };

    function log(msg) {
        const console = document.getElementById('debugConsole');
        console.innerHTML += `> ${msg}<br>`;
        console.scrollTop = console.scrollHeight;
    }

    let audioContext, recognizer, scriptNode;

    async function startAssessment() {
        const st = document.getElementById('st');
        const btn = document.getElementById('recordBtn');
        const word = document.getElementById('wd').innerText;
        
        log("Initializng Mic...");
        btn.classList.add('listening');

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { sampleRate: 16000, channelCount: 1 } 
            });
            log("Mic Stream Active.");

            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const source = audioContext.createMediaStreamSource(stream);
            const pushStream = SpeechSDK.AudioInputStream.createPushStream();

            scriptNode = audioContext.createScriptProcessor(4096, 1, 1);
            source.connect(scriptNode);
            scriptNode.connect(audioContext.destination);

            let maxVal = 0;
            let totalPackets = 0;

            scriptNode.onaudioprocess = (e) => {
                const input = e.inputBuffer.getChannelData(0);
                const pcm = new Int16Array(input.length);
                for (let i = 0; i < input.length; i++) {
                    const s = Math.max(-1, Math.min(1, input[i]));
                    pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    if (Math.abs(pcm[i]) > maxVal) maxVal = Math.abs(pcm[i]);
                }
                pushStream.write(pcm.buffer);
                totalPackets++;
                if (totalPackets % 20 === 0) {
                    document.getElementById('volLevel').style.width = (maxVal / 327.68) + "%";
                }
            };

            const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(CONFIG.key, CONFIG.region);
            const audioConfig = SpeechSDK.AudioConfig.fromStreamInput(pushStream);
            const pronConfig = new SpeechSDK.PronunciationAssessmentConfig(word, 2, 1);

            recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
            pronConfig.applyTo(recognizer);

            log("Connecting to Azure...");
            recognizer.recognizeOnceAsync(result => {
                log(`Result Reason: ${result.reason}`);
                if (result.reason === SpeechSDK.ResultReason.NoMatch) {
                    log("!! NoMatch: 引擎未偵測到語音。");
                }
                log(`Max Amplitude: ${maxVal}`);
                
                stream.getTracks().forEach(t => t.stop());
                pushStream.close();
                scriptNode.disconnect();
                btn.classList.remove('listening');

                if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
                    const res = SpeechSDK.PronunciationAssessmentResult.fromResult(result);
                    document.getElementById('sc').innerText = Math.round(res.accuracyScore);
                    st.innerText = "Success";
                } else {
                    st.innerText = "Fail: " + result.reason;
                }
                recognizer.close();
            }, err => {
                log("Error: " + err);
                btn.classList.remove('listening');
            });

        } catch (err) {
            log("Fatal: " + err.message);
            btn.classList.remove('listening');
        }
    }

    document.getElementById('recordBtn').onpointerdown = (e) => {
        e.preventDefault();
        startAssessment();
    };
</script>
</body>
</html>

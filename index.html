<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Phonics Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { transition: all 0.2s ease; border: 2px solid transparent; }
        .active-unit { background-color: #fef3c7; border-color: #f59e0b; color: #b45309; transform: scale(1.1); }
        .score-anim { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #f59e0b; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden flex flex-col">

    <header class="bg-white pt-12 pb-4 px-6 shadow-sm border-b border-gray-100">
        <div class="flex justify-between items-end">
            <div>
                <p class="text-xs font-black text-amber-500 uppercase tracking-widest">American English</p>
                <h1 class="text-2xl font-bold text-slate-800">Phonics Master</h1>
            </div>
            <div id="unit-display" class="bg-amber-500 text-white px-3 py-1 rounded-lg text-sm font-bold shadow-sm">Short A</div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar" id="app-content"></main>

    <div class="bg-white border-t border-gray-200">
        <div class="flex overflow-x-auto py-4 px-4 space-x-4 no-scrollbar items-center" id="nav-bar"></div>
        <div class="text-center pb-8 text-[10px] text-gray-400 font-medium tracking-widest">PWA PHONICS LEARNING SYSTEM</div>
    </div>

    <script>
        const wordData = {
            shortA: { label: 'Short A', icon: '🍎', data: [
                { word: 'Cat', sound: 'at', longVersion: 'kate' }, { word: 'Bag', sound: 'ag', longVersion: 'baig' },
                { word: 'Cap', sound: 'ap', longVersion: 'cape' }, { word: 'Sad', sound: 'ad', longVersion: 'said' },
                { word: 'Van', sound: 'an', longVersion: 'vain' }, { word: 'Bat', sound: 'at', longVersion: 'bait' },
                { word: 'Rat', sound: 'at', longVersion: 'rate' }, { word: 'Pan', sound: 'an', longVersion: 'pain' },
                { word: 'Can', sound: 'an', longVersion: 'cane' }
            ]},
            shortE: { label: 'Short E', icon: '🥚', data: [
                { word: 'Bed', sound: 'ed', longVersion: 'bead' }, { word: 'Jet', sound: 'et', longVersion: 'jeet' },
                { word: 'Red', sound: 'ed', longVersion: 'read' }, { word: 'Net', sound: 'et', longVersion: 'neat' }
            ]},
            shortI: { label: 'Short I', icon: '🐷', data: [
                { word: 'Pin', sound: 'in', longVersion: 'pine' }, { word: 'Lid', sound: 'id', longVersion: 'lied' },
                { word: 'Sit', sound: 'it', longVersion: 'site' }, { word: 'Kit', sound: 'it', longVersion: 'kite' }
            ]}
        };

        let currentKey = 'shortA';

        function playSound(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function startRecognition(targetWord, longVersion, index) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("您的瀏覽器不支援錄音功能");

            const statusArea = document.getElementById(`status-${index}`);
            const feedbackArea = document.getElementById(`feedback-${index}`);
            
            // 顯示錄音進度圖示
            statusArea.innerHTML = '<div class="spinner"></div>';
            feedbackArea.innerText = '正在錄音中...';
            feedbackArea.className = 'text-xs text-amber-500 font-bold mt-1';

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            
            recognition.onresult = (event) => {
                const result = event.results[0][0].transcript.toLowerCase().trim();
                const target = targetWord.toLowerCase().trim();
                const longV = longVersion.toLowerCase().trim();

                statusArea.innerHTML = '<span class="text-green-500 text-xl">✓</span>'; // 辨識到就顯示完成

                if (result === target) {
                    feedbackArea.innerText = "太棒了！發音非常標準喔！";
                    feedbackArea.className = "text-sm text-green-600 font-bold mt-1 score-anim";
                } else if (result.includes(longV) || (currentKey.startsWith('short') && result.includes('ay'))) {
                    feedbackArea.innerText = `聽起來像 Long音耶，要唸短音喔！再試一次`;
                    feedbackArea.className = "text-sm text-red-500 font-bold mt-1 score-anim";
                } else {
                    feedbackArea.innerText = `剛才唸的是 "${result}" 嗎？再試試看喔！`;
                    feedbackArea.className = "text-sm text-orange-500 font-bold mt-1";
                }
                recognition.stop();
            };

            recognition.onerror = () => {
                statusArea.innerHTML = '🎤';
                feedbackArea.innerText = '沒聽清楚，請點擊重試';
            };

            recognition.start();
        }

        function renderApp() {
            const container = document.getElementById('app-content');
            const nav = document.getElementById('nav-bar');
            
            container.innerHTML = wordData[currentKey].data.map((item, i) => `
                <div class="card bg-white rounded-2xl p-5 shadow-sm flex items-center justify-between border-l-8 ${currentKey.startsWith('short') ? 'border-amber-400' : 'border-blue-400'}">
                    <div class="flex-1" onclick="playSound('${item.word}')">
                        <h2 class="text-3xl font-bold text-slate-800">${item.word}</h2>
                        <p class="text-gray-400 text-sm italic">Family: -${item.sound}</p>
                    </div>
                    <div class="flex flex-col items-center pl-4 border-l border-gray-100 min-w-[120px]">
                        <button id="status-${i}" onclick="startRecognition('${item.word}', '${item.longVersion}', ${i})" class="bg-gray-100 w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-inner transition-all active:scale-90">
                            🎤
                        </button>
                        <div id="feedback-${i}" class="text-[10px] text-gray-300 font-bold mt-2 text-center leading-tight">點擊麥克風練習</div>
                    </div>
                </div>
            `).join('');

            nav.innerHTML = Object.keys(wordData).map(key => `
                <button onclick="switchUnit('${key}')" class="flex-shrink-0 flex flex-col items-center px-4 py-2 rounded-xl border ${currentKey === key ? 'active-unit shadow-md' : 'bg-white border-transparent text-gray-400'}">
                    <span class="text-2xl">${wordData[key].icon}</span>
                    <span class="text-[10px] font-bold whitespace-nowrap">${wordData[key].label}</span>
                </button>
            `).join('');

            document.getElementById('unit-display').innerText = wordData[currentKey].label;
        }

        function switchUnit(key) { currentKey = key; renderApp(); }
        renderApp();
    </script>
</body>
</html>

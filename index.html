<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Phonics Master Mobile Pro</title>
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-active { color: #EE1515; border-bottom: 3px solid #EE1515; }
        .poke-card { border: 6px solid #FFDE00; border-radius: 20px; transition: transform 0.1s; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3B4CCA; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .mic-btn { width: 50px; height: 50px; background-image: url('https://img.icons8.com/color/96/pokeball.png'); background-size: contain; background-repeat: no-repeat; }
        .recording .mic-btn { animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: rotate(0); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden">

    <div id="setup-overlay" class="fixed inset-0 bg-red-600 z-50 flex flex-col items-center justify-center text-white p-6">
        <div class="text-8xl mb-6">🔴</div>
        <h1 class="text-3xl font-black mb-8 text-yellow-400 text-center">POKÉ PHONICS MOBILE</h1>
        <button onclick="initApp()" class="bg-white text-red-600 px-12 py-4 rounded-full font-black text-xl shadow-xl">START TRAINING</button>
    </div>

    <header class="bg-white pt-12 px-6 shadow-sm border-b">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">Trainer Dashboard</h1>
            <button onclick="showAddModal()" class="bg-red-50 text-red-600 px-3 py-1 rounded-full font-bold text-xs">＋ ADD NEW</button>
        </div>
        <div class="flex space-x-8 text-sm">
            <button onclick="switchTab('words')" id="tab-words" class="pb-2 font-bold tab-active">WORDS</button>
            <button onclick="switchTab('sentences')" id="tab-sentences" class="pb-2 font-bold text-gray-400">SENTENCES</button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 no-scrollbar" id="app-content"></main>

    <nav id="unit-nav" class="bg-white border-t p-4 flex gap-3 overflow-x-auto no-scrollbar"></nav>

    <div id="add-modal" class="fixed inset-0 bg-black/60 z-40 hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-6 w-full">
            <h3 class="font-bold mb-4">Add Content</h3>
            <textarea id="input-content" class="w-full border p-3 rounded-xl mb-4 h-24" placeholder="Enter word or sentence (100 chars)..."></textarea>
            <div class="flex gap-3">
                <button onclick="hideAddModal()" class="flex-1 py-3 text-gray-400 font-bold">Cancel</button>
                <button onclick="processAdd()" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const azureKey = "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k";
        const azureRegion = "eastasia";
        let isRecording = false;
        let currentTab = 'words';
        let currentUnit = 'shortA';

        // 在地儲存資料
        let wordData = JSON.parse(localStorage.getItem('local_poke_words')) || {
            shortA: { label: 'Short A', icon: '🍎', data: [{word:'Cat'}] },
            longA: { label: 'Long A', icon: '🍰', data: [{word:'Cake'}] }
        };
        let sentenceData = JSON.parse(localStorage.getItem('local_poke_sentences')) || ["The cat sat on the mat."];

        function initApp() {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(() => {
                document.getElementById('setup-overlay').style.display = 'none';
                renderApp();
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-words').className = tab === 'words' ? 'pb-2 font-bold tab-active' : 'pb-2 font-bold text-gray-400';
            document.getElementById('tab-sentences').className = tab === 'sentences' ? 'pb-2 font-bold tab-active' : 'pb-2 font-bold text-gray-400';
            document.getElementById('unit-nav').style.display = tab === 'words' ? 'flex' : 'none';
            renderApp();
        }

        // --- AI 自動歸類邏輯 ---
        function autoCategorize(word) {
            word = word.toLowerCase();
            if (word.endsWith('e') || word.includes('ai') || word.includes('ay')) return 'longA';
            if (word.includes('ee') || word.includes('ea')) return 'longE';
            return 'shortA';
        }

        function processAdd() {
            const input = document.getElementById('input-content').value.trim();
            if (!input || input.length > 100) return alert("100 characters max!");

            if (currentTab === 'words') {
                const cat = autoCategorize(input);
                if(!wordData[cat]) wordData[cat] = { label: cat, icon: '🆕', data: [] };
                wordData[cat].data.push({ word: input });
                localStorage.setItem('local_poke_words', JSON.stringify(wordData));
            } else {
                sentenceData.push(input);
                localStorage.setItem('local_poke_sentences', JSON.stringify(sentenceData));
            }
            hideAddModal();
            renderApp();
        }

        function speak(text) {
            if(isRecording) return;
            const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(azureKey, azureRegion);
            speechConfig.speechSynthesisVoiceName = "en-US-AvaNeural";
            const synthesizer = new SpeechSDK.SpeechSynthesizer(speechConfig);
            synthesizer.speakTextAsync(text, r => synthesizer.close());
        }

        async function startEval(text, index) {
            if(isRecording) return;
            isRecording = true;
            document.querySelectorAll('.mic-btn-container').forEach(el => el.style.pointerEvents = 'none');

            const fb = document.getElementById(`fb-${index}`);
            const card = document.getElementById(`card-${index}`);
            card.classList.add('recording');
            
            let timeLeft = 5;
            const timer = setInterval(() => {
                timeLeft--;
                fb.innerText = `Listening... (${timeLeft}s)`;
                if(timeLeft <= 0) clearInterval(timer);
            }, 1000);

            const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(azureKey, azureRegion);
            const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
            const pronConfig = new SpeechSDK.PronunciationAssessmentConfig(text, 100, 0);
            const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
            pronConfig.applyTo(recognizer);

            recognizer.recognizeOnceAsync(result => {
                clearInterval(timer);
                const score = SpeechSDK.PronunciationAssessmentResult.fromResult(result).accuracyScore;
                card.classList.remove('recording');
                fb.innerText = score >= 80 ? "EXCELLENT! 🌟" : "TRY AGAIN! 💢";
                fb.className = score >= 80 ? "text-[10px] font-bold mt-2 text-green-600" : "text-[10px] font-bold mt-2 text-red-500";
                
                isRecording = false;
                document.querySelectorAll('.mic-btn-container').forEach(el => el.style.pointerEvents = 'auto');
                recognizer.close();
            });
        }

        function renderApp() {
            const container = document.getElementById('app-content');
            const nav = document.getElementById('unit-nav');

            if (currentTab === 'words') {
                container.innerHTML = (wordData[currentUnit]?.data || []).map((item, i) => `
                    <div class="poke-card bg-white p-5 mb-4 flex justify-between items-center shadow-sm" id="card-${i}">
                        <div onclick="speak('${item.word}')" class="flex-1">
                            <h2 class="text-3xl font-black text-blue-800 uppercase tracking-tighter">${item.word}</h2>
                            <p class="text-[10px] text-gray-400 font-bold italic">-${currentUnit} type</p>
                        </div>
                        <div class="flex flex-col items-center ml-4 mic-btn-container" onclick="startEval('${item.word}', ${i})">
                            <div class="mic-btn"></div>
                            <p id="fb-${i}" class="text-[10px] font-bold mt-2 text-gray-300">Tap to record</p>
                        </div>
                    </div>`).join('');
                
                nav.innerHTML = Object.keys(wordData).map(key => `
                    <button onclick="switchUnit('${key}')" class="flex-shrink-0 flex flex-col items-center px-4 py-2 rounded-xl border ${currentUnit === key ? 'bg-yellow-100 border-yellow-400' : 'border-transparent text-gray-400'}">
                        <span class="text-xl">${wordData[key].icon}</span><span class="text-[10px] font-bold">${wordData[key].label}</span>
                    </button>`).join('');
            } else {
                container.innerHTML = sentenceData.map((s, i) => `
                    <div class="bg-white rounded-2xl p-5 mb-4 border-l-8 border-blue-500 shadow-sm" id="card-${i}">
                        <p class="text-lg font-bold text-slate-700 mb-4" onclick="speak('${s}')">${s}</p>
                        <div class="flex justify-between items-center border-t pt-3">
                            <p id="fb-${i}" class="text-xs font-bold text-gray-400 italic">Read the sentence</p>
                            <div onclick="startEval('${s}', ${i})" class="mic-btn scale-75 mic-btn-container"></div>
                        </div>
                    </div>`).join('');
            }
        }

        function switchUnit(key) { currentUnit = key; renderApp(); }
        function showAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
        function hideAddModal() { document.getElementById('add-modal').classList.add('hidden'); document.getElementById('input-content').value = ''; }
        
        renderApp();
    </script>
</body>
</html>

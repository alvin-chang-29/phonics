<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Phonics Hero iPad v3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://aka.ms/csspeechjs-browser-sdk"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; -webkit-user-select: none; background-color: #FDF4D0; margin: 0; }
        .ipad-sidebar { background-color: rgba(45, 45, 45, 0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .active-lesson { background-color: #CC0000 !important; color: white !important; transform: scale(1.02); }
        .card-pokemon { background: white; border-radius: 40px; box-shadow: 0 12px 0px #E5E5E5; border: 2px solid #F3F4F6; transition: all 0.2s; }
        .card-pokemon:active { transform: translateY(4px); box-shadow: 0 4px 0px #E5E5E5; }
        #boot-screen { position: fixed; inset: 0; background: #111111; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div id="boot-screen">
        <div class="text-center mb-10">
            <h1 class="text-6xl font-black text-yellow-400 italic mb-4">PHONICS HERO</h1>
            <p class="text-gray-500 tracking-[0.3em] font-bold">VERSION 3.5 (iPad FINAL)</p>
        </div>
        <button onclick="ipadMasterUnlock()" class="bg-blue-600 hover:bg-blue-700 text-white px-20 py-10 rounded-full text-4xl font-black shadow-[0_0_50px_rgba(37,99,235,0.5)] active:scale-95 transition-all">
            INITIALIZE SYSTEM
        </button>
        <p class="mt-10 text-gray-700 text-sm">請確認 iPad 側邊靜音開關已關閉</p>
    </div>

    <aside class="w-80 ipad-sidebar flex flex-col z-50">
        <div class="p-8 border-b border-gray-700">
            <h2 class="text-white text-3xl font-black italic">TRAINER</h2>
            <div class="mt-6">
                <label class="text-gray-400 text-[10px] font-black uppercase mb-2 block">Voice Selection</label>
                <select id="voice-select" class="w-full bg-gray-800 text-white p-4 rounded-2xl border-2 border-gray-600 outline-none font-bold">
                    <option value="en-US-AvaNeural">Ava (Young Lady)</option>
                    <option value="en-US-AndrewNeural">Andrew (Man)</option>
                    <option value="en-US-EmmaNeural">Emma (Child-like)</option>
                    <option value="en-US-BrianNeural">Brian (Clear)</option>
                </select>
            </div>
        </div>

        <nav class="flex-1 p-6 space-y-3 overflow-y-auto">
            <div class="text-gray-500 text-[10px] font-black uppercase tracking-widest px-2 mb-2">Short Vowels</div>
            <button onclick="changeCat('short-a', this)" class="nav-item active-lesson w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl transition-all">🍎 Short A</button>
            <button onclick="changeCat('short-e', this)" class="nav-item w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl transition-all">🍳 Short E</button>
            <button onclick="changeCat('short-i', this)" class="nav-item w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl transition-all">🧊 Short I</button>
            <button onclick="changeCat('short-o', this)" class="nav-item w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl transition-all">🐙 Short O</button>
            <button onclick="changeCat('short-u', this)" class="nav-item w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl transition-all">☔ Short U</button>
            
            <div class="border-t border-gray-700 my-4"></div>
            <div class="text-gray-500 text-[10px] font-black uppercase tracking-widest px-2 mb-2">Long Vowels</div>
            <button onclick="changeCat('long-a', this)" class="nav-item w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl transition-all">🍰 Long A</button>
            <button onclick="changeCat('long-e', this)" class="nav-item w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl transition-all">🍃 Long E</button>
            <button onclick="changeCat('long-i', this)" class="nav-item w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl transition-all">🪁 Long I</button>
            <button onclick="changeCat('long-o', this)" class="nav-item w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl transition-all">⛵ Long O</button>
            <button onclick="changeCat('long-u', this)" class="nav-item w-full p-5 rounded-3xl flex items-center gap-4 text-gray-400 font-black text-xl transition-all">🦄 Long U</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="h-32 flex justify-between items-center px-12">
            <h3 id="display-title" class="text-5xl font-black text-gray-800 italic uppercase">Short A</h3>
            <div id="score-ring" class="hidden bg-green-500 text-white px-10 py-4 rounded-full font-black text-2xl shadow-xl animate-bounce">
                SCORE: <span id="last-score">0</span>
            </div>
        </header>

        <div id="grid-container" class="flex-1 overflow-y-auto px-12 pb-24 grid grid-cols-2 xl:grid-cols-3 gap-10">
            </div>

        <div id="rec-overlay" class="hidden fixed inset-0 z-[999] bg-white/95 flex flex-col items-center justify-center">
            <div id="rec-timer" class="text-[20rem] font-black text-red-600 leading-none italic">4</div>
            <div class="text-4xl font-black text-gray-400 uppercase tracking-[0.5em] animate-pulse">Listening...</div>
        </div>
    </main>

    <script>
        const AZURE_KEY = "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k";
        const REGION = "eastasia";
        
        // 匯入所有照片中的單字
        const words = [
            // Short A
            {t:'cat',c:'short-a'},{t:'bat',c:'short-a'},{t:'mat',c:'short-a'},{t:'hat',c:'short-a'},{t:'fan',c:'short-a'},{t:'can',c:'short-a'},{t:'pan',c:'short-a'},{t:'van',c:'short-a'},{t:'map',c:'short-a'},{t:'cap',c:'short-a'},{t:'tap',c:'short-a'},{t:'nap',c:'short-a'},{t:'bag',c:'short-a'},{t:'tag',c:'short-a'},{t:'rag',c:'short-a'},{t:'wag',c:'short-a'},{t:'ham',c:'short-a'},{t:'jam',c:'short-a'},{t:'yam',c:'short-a'},{t:'dam',c:'short-a'},{t:'dad',c:'short-a'},{t:'sad',c:'short-a'},{t:'mad',c:'short-a'},{t:'bad',c:'short-a'},
            // Short E
            {t:'hen',c:'short-e'},{t:'pen',c:'short-e'},{t:'ten',c:'short-e'},{t:'men',c:'short-e'},{t:'red',c:'short-e'},{t:'bed',c:'short-e'},{t:'jet',c:'short-e'},{t:'net',c:'short-e'},{t:'wet',c:'short-e'},{t:'pet',c:'short-e'},
            // Short I
            {t:'pig',c:'short-i'},{t:'wig',c:'short-i'},{t:'dig',c:'short-i'},{t:'bin',c:'short-i'},{t:'fin',c:'short-i'},{t:'pin',c:'short-i'},{t:'win',c:'short-i'},{t:'sit',c:'short-i'},{t:'hit',c:'short-i'},
            // Short O
            {t:'hot',c:'short-o'},{t:'pot',c:'short-o'},{t:'cot',c:'short-o'},{t:'dot',c:'short-o'},{t:'hop',c:'short-o'},{t:'mop',c:'short-o'},{t:'top',c:'short-o'},{t:'cop',c:'short-o'},{t:'dog',c:'short-o'},{t:'log',c:'short-o'},
            // Short U
            {t:'sun',c:'short-u'},{t:'run',c:'short-u'},{t:'gun',c:'short-u'},{t:'bun',c:'short-u'},{t:'jug',c:'short-u'},{t:'mug',c:'short-u'},{t:'rug',c:'short-u'},{t:'bug',c:'short-u'},{t:'nut',c:'short-u'},{t:'cut',c:'short-u'},
            // Long A
            {t:'cake',c:'long-a'},{t:'lake',c:'long-a'},{t:'bake',c:'long-a'},{t:'rake',c:'long-a'},{t:'fake',c:'long-a'},{t:'make',c:'long-a'},{t:'take',c:'long-a'},{t:'mail',c:'long-a'},{t:'tail',c:'long-a'},{t:'rain',c:'long-a'},{t:'day',c:'long-a'},{t:'say',c:'long-a'},
            // Long E
            {t:'bee',c:'long-e'},{t:'tree',c:'long-e'},{t:'seed',c:'long-e'},{t:'leaf',c:'long-e'},{t:'bean',c:'long-e'},{t:'meat',c:'long-e'},
            // Long I
            {t:'bike',c:'long-i'},{t:'hike',c:'long-i'},{t:'like',c:'long-i'},{t:'kite',c:'long-i'},{t:'bite',c:'long-i'},{t:'ride',c:'long-i'},{t:'light',c:'long-i'},{t:'night',c:'long-i'},
            // Long O
            {t:'bone',c:'long-o'},{t:'cone',c:'long-o'},{t:'rope',c:'long-o'},{t:'hope',c:'long-o'},{t:'boat',c:'long-o'},{t:'coat',c:'long-o'},{t:'goat',c:'long-o'},{t:'road',c:'long-o'},
            // Long U
            {t:'blue',c:'long-u'},{t:'glue',c:'long-u'},{t:'true',c:'long-u'},{t:'flute',c:'long-u'},{t:'cute',c:'long-u'},{t:'duke',c:'long-u'}
        ];

        let sdkConfig = null;

        async function ipadMasterUnlock() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                if (ctx.state === 'suspended') await ctx.resume();
                await navigator.mediaDevices.getUserMedia({ audio: true });

                sdkConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, REGION);
                const syn = new SpeechSDK.SpeechSynthesizer(sdkConfig);
                syn.speakTextAsync("", () => {
                    syn.close();
                    document.getElementById('boot-screen').style.display = 'none';
                    renderGrid('short-a');
                });
            } catch (e) {
                alert("初始化失敗: " + e.message);
            }
        }

        function changeCat(cat, btn) {
            document.getElementById('display-title').innerText = cat.replace('-', ' ');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-lesson'));
            btn.classList.add('active-lesson');
            renderGrid(cat);
        }

        function renderGrid(cat) {
            const container = document.getElementById('grid-container');
            const filtered = words.filter(w => w.c === cat);
            container.innerHTML = filtered.map(w => `
                <div class="card-pokemon p-12 flex flex-col items-center justify-between">
                    <h4 class="text-8xl font-black text-gray-800 lowercase tracking-tighter">${w.t}</h4>
                    <div class="w-full mt-12 flex gap-4">
                        <button onclick="startiPadRec('${w.t}')" class="flex-1 bg-[#CC0000] text-white py-6 rounded-3xl font-black text-2xl active:scale-95 transition-all shadow-lg">練習</button>
                        <button onclick="playVoice('${w.t}')" class="w-24 h-24 bg-gray-100 rounded-3xl flex items-center justify-center text-4xl active:bg-gray-200">🔊</button>
                    </div>
                </div>
            `).join('');
        }

        function playVoice(text) {
            sdkConfig.speechSynthesisVoiceName = document.getElementById('voice-select').value;
            const syn = new SpeechSDK.SpeechSynthesizer(sdkConfig);
            syn.speakTextAsync(text, () => syn.close(), () => syn.close());
        }

        function startiPadRec(text) {
            const overlay = document.getElementById('rec-overlay');
            overlay.classList.remove('hidden');
            let count = 4;
            document.getElementById('rec-timer').innerText = count;
            const cd = setInterval(() => {
                count--;
                if (count > 0) document.getElementById('rec-timer').innerText = count;
                else {
                    clearInterval(cd);
                    overlay.classList.add('hidden');
                    runAssessment(text);
                }
            }, 1000);
        }

        function runAssessment(text) {
            const audio = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
            const pron = new SpeechSDK.PronunciationAssessmentConfig(text, 
                SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark,
                SpeechSDK.PronunciationAssessmentGranularity.Phoneme);
            const rec = new SpeechSDK.SpeechRecognizer(sdkConfig, audio);
            pron.applyTo(rec);
            rec.recognizeOnceAsync(res => {
                const result = SpeechSDK.PronunciationAssessmentResult.fromResult(res);
                if (result) {
                    const score = Math.round(result.accuracyScore);
                    document.getElementById('last-score').innerText = score;
                    document.getElementById('score-ring').classList.remove('hidden');
                    setTimeout(() => document.getElementById('score-ring').classList.add('hidden'), 3000);
                }
                rec.close();
            }, () => rec.close());
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phonics Hero Pro - iPad Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://aka.ms/csspeechjs-browser-sdk"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; -webkit-tap-highlight-color: transparent; }
        .sidebar-item-active { background-color: #E64A4A !important; color: white !important; }
        .card-shadow { box-shadow: 0 8px 0px #E5E5E5; }
        .lowercase { text-transform: lowercase; }
        /* 滾動條隱藏但保持功能 (iPad 簡約風) */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="h-screen overflow-hidden flex bg-[#FDF4D0]">

    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-90 z-[100] flex flex-col items-center justify-center text-white p-6 text-center">
        <div class="w-24 h-24 mb-6 bg-red-600 rounded-full border-8 border-white animate-pulse flex items-center justify-center text-4xl">GO</div>
        <h1 class="text-5xl mb-4 font-black text-yellow-400 italic font-sans">PHONICS HERO</h1>
        <p class="mb-8 text-gray-400">請點擊下方按鈕啟動練習系統</p>
        <button onclick="initApp()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 px-16 rounded-full text-2xl shadow-2xl transition-all active:scale-95">
            READY!
        </button>
    </div>

    <aside class="w-72 bg-[#3E3E3E] flex flex-col shadow-2xl z-20">
        <div class="p-8 flex items-center gap-4 border-b border-gray-600">
            <div class="w-10 h-10 bg-yellow-400 rounded-full border-4 border-white flex items-center justify-center text-xl">⚡</div>
            <span class="text-white font-black text-lg tracking-tighter uppercase">Trainer Hub</span>
        </div>

        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="changeCategory('short-a')" id="btn-short-a" class="sidebar-btn w-full flex items-center gap-3 p-4 rounded-2xl bg-transparent text-gray-300 font-bold sidebar-item-active">
                <span class="text-2xl">🍎</span> Short A
            </button>
            <button onclick="changeCategory('short-e')" id="btn-short-e" class="sidebar-btn w-full flex items-center gap-3 p-4 rounded-2xl bg-transparent text-gray-300 font-bold">
                <span class="text-2xl">🍳</span> Short E
            </button>
            <button onclick="changeCategory('short-i')" id="btn-short-i" class="sidebar-btn w-full flex items-center gap-3 p-4 rounded-2xl bg-transparent text-gray-300 font-bold">
                <span class="text-2xl">🧊</span> Short I
            </button>
            <button onclick="changeCategory('short-o')" id="btn-short-o" class="sidebar-btn w-full flex items-center gap-3 p-4 rounded-2xl bg-transparent text-gray-300 font-bold">
                <span class="text-2xl">🐙</span> Short O
            </button>
            <button onclick="changeCategory('short-u')" id="btn-short-u" class="sidebar-btn w-full flex items-center gap-3 p-4 rounded-2xl bg-transparent text-gray-300 font-bold">
                <span class="text-2xl">☔</span> Short U
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="p-8 flex justify-between items-center bg-white bg-opacity-30">
            <div>
                <h2 id="cat-title" class="text-4xl font-black text-[#3E3E3E] uppercase italic leading-none">Short A</h2>
            </div>
            <div id="global-score-badge" class="hidden bg-green-500 text-white px-6 py-2 rounded-full font-black animate-bounce shadow-lg">
                Awesome! <span id="global-score">0</span>
            </div>
        </header>

        <div id="recording-indicator" class="hidden absolute inset-0 z-50 bg-white bg-opacity-90 flex flex-col items-center justify-center">
            <div id="countdown-text" class="text-9xl font-black text-red-600 mb-4 italic">4</div>
            <p class="text-2xl font-black text-gray-800 uppercase tracking-widest animate-pulse">Listening...</p>
        </div>

        <div id="card-grid" class="flex-1 overflow-y-auto p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-8 items-start">
            </div>
    </main>

    <script>
        const AZURE_KEY = "76hZ0aIRPIj1XkOMXHRL8TAvTvurzg3JybPyFMJXvNKFaBI4h0i7JQQJ99CBAC3pKaRXJ3w3AAAYACOGP64k";
        const REGION = "eastasia";
        
        // 預設單字庫
        const initialWords = [
            { text: 'cat', category: 'short-a' }, { text: 'bat', category: 'short-a' }, { text: 'hat', category: 'short-a' }, { text: 'mat', category: 'short-a' },
            { text: 'hen', category: 'short-e' }, { text: 'pen', category: 'short-e' }, { text: 'ten', category: 'short-e' }, { text: 'red', category: 'short-e' },
            { text: 'pig', category: 'short-i' }, { text: 'wig', category: 'short-i' }, { text: 'bin', category: 'short-i' }, { text: 'sit', category: 'short-i' },
            { text: 'hot', category: 'short-o' }, { text: 'pot', category: 'short-o' }, { text: 'dog', category: 'short-o' }, { text: 'log', category: 'short-o' },
            { text: 'sun', category: 'short-u' }, { text: 'run', category: 'short-u' }, { text: 'bug', category: 'short-u' }, { text: 'nut', category: 'short-u' }
        ];

        let items = JSON.parse(localStorage.getItem('phonics_ipad_v2')) || initialWords;
        let currentCategory = 'short-a';
        let speechConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, REGION);
        speechConfig.speechSynthesisVoiceName = "en-US-AvaNeural"; // 設定高品質真人女聲

        function initApp() {
            // 在點擊時主動請求麥克風權限 (iPad 關鍵)
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => {
                    document.getElementById('overlay').classList.add('hidden');
                    renderCards();
                })
                .catch(err => alert("請開啟麥克風權限以進行練習"));
        }

        function changeCategory(cat) {
            currentCategory = cat;
            document.getElementById('cat-title').innerText = cat.replace('-', ' ');
            document.querySelectorAll('.sidebar-btn').forEach(btn => btn.classList.remove('sidebar-item-active'));
            document.getElementById(`btn-${cat}`).classList.add('sidebar-item-active');
            renderCards();
        }

        function renderCards() {
            const grid = document.getElementById('card-grid');
            const filtered = items.filter(i => i.category === currentCategory);
            
            grid.innerHTML = filtered.map(item => `
                <div class="bg-white rounded-[40px] p-8 card-shadow border-2 border-gray-100 flex flex-col items-center">
                    <h3 class="text-7xl font-black text-[#3E3E3E] lowercase mb-10 tracking-tight">${item.text}</h3>
                    <div class="w-full flex gap-3">
                        <button onclick="startTraining('${item.text}')" class="flex-1 bg-[#E64A4A] text-white py-5 rounded-3xl font-black shadow-lg flex items-center justify-center gap-2 active:scale-95">
                            <span class="text-2xl">🎤</span> 錄音練習
                        </button>
                        <button onclick="playTTS('${item.text}')" class="w-20 h-20 bg-gray-100 rounded-3xl flex items-center justify-center text-3xl active:bg-gray-200">
                            🔊
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // --- 真人發音 (Azure TTS) ---
        function playTTS(text) {
            const synthesizer = new SpeechSDK.SpeechSynthesizer(speechConfig);
            synthesizer.speakTextAsync(text, 
                result => {
                    if (result) synthesizer.close();
                },
                error => {
                    console.error(error);
                    synthesizer.close();
                }
            );
        }

        // --- 核心錄音評測 (4秒倒數) ---
        async function startTraining(refText) {
            const indicator = document.getElementById('recording-indicator');
            const countdownText = document.getElementById('countdown-text');
            
            indicator.classList.remove('hidden');
            let timer = 4;
            countdownText.innerText = timer;

            const interval = setInterval(() => {
                timer--;
                if (timer > 0) {
                    countdownText.innerText = timer;
                } else {
                    clearInterval(interval);
                    indicator.classList.add('hidden');
                    runAzureAssessment(refText);
                }
            }, 1000);
        }

        function runAzureAssessment(refText) {
            const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
            const pronConfig = new SpeechSDK.PronunciationAssessmentConfig(
                refText, 
                SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark,
                SpeechSDK.PronunciationAssessmentGranularity.Phoneme
            );

            const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
            pronConfig.applyTo(recognizer);

            recognizer.recognizeOnceAsync(result => {
                const res = SpeechSDK.PronunciationAssessmentResult.fromResult(result);
                if (res) {
                    const score = Math.round(res.accuracyScore);
                    showScore(score);
                }
                recognizer.close();
            });
        }

        function showScore(score) {
            const badge = document.getElementById('global-score-badge');
            document.getElementById('global-score').innerText = score;
            badge.classList.remove('hidden');
            setTimeout(() => badge.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
